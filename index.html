<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EBH TEAM | পেমেন্ট সিস্টেম</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0f1e;
            min-height: 100vh;
            padding: 12px;
            transition: background 0.3s;
        }

        /* লাইট মোড */
        body.light-mode {
            background: #f0f4fa;
        }
        body.light-mode .main-card {
            background: rgba(255,255,255,0.95);
            border-color: rgba(0,0,0,0.1);
        }
        body.light-mode .input-field {
            background: #f5f7fb;
            border-color: #ddd;
            color: #333;
        }
        body.light-mode .rule-item {
            background: #f8f9ff;
            color: #333;
        }
        body.light-mode .maintenance-notice {
            background: #ffebee;
            color: #c62828;
            border-color: #ef5350;
        }

        /* থিম টগল */
        .theme-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1000;
        }
        .theme-btn {
            width: 44px;
            height: 44px;
            border-radius: 30px;
            background: rgba(255,215,0,0.2);
            border: 1px solid #ffd700;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            color: #ffd700;
        }

        /* মেইন কন্টেইনার */
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding-top: 20px;
        }

        /* মেইন কার্ড */
        .main-card {
            background: rgba(20, 25, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 22px 18px;
            border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* মেইনটেন্যান্স নোটিশ - এখন কাজ করবে */
        .maintenance-notice {
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #f44336;
            color: #ffcdd2;
            padding: 16px 20px;
            border-radius: 40px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(244,67,54,0.3);
            display: none;
        }
        .maintenance-notice.show {
            display: block;
        }
        .maintenance-notice i {
            margin-right: 8px;
            color: #f44336;
        }

        /* স্টাইলিশ গোল্ড লোগো */
        .logo-area {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }
        .gold-logo {
            font-size: 48px;
            font-weight: 900;
            font-family: 'Orbitron', 'Rajdhani', sans-serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffd700;
            text-shadow: 
                0 0 10px #ffd700,
                0 0 20px #ffd700,
                2px 2px 0 #000,
                -2px -2px 0 #000,
                2px -2px 0 #000,
                -2px 2px 0 #000;
            line-height: 1.2;
            animation: glowPulse 2s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700, 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000; }
            50% { text-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700, 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000; }
        }
        .logo-badge {
            display: inline-block;
            background: linear-gradient(145deg, #ffd700, #ffa500);
            color: #000;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
            letter-spacing: 1px;
        }

        /* টাইপ সিলেক্টর */
        .type-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .type-btn {
            flex: 1;
            padding: 16px 8px;
            border-radius: 40px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            border: none;
            background: #2d3349;
            color: white;
            box-shadow: 0 8px 0 #1a1e2b;
            transition: 0.1s;
            cursor: pointer;
        }
        .type-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #1a1e2b;
        }
        .type-btn.cookies.active {
            background: #ff4757;
        }
        .type-btn.twofa.active {
            background: #4834d4;
        }
        .type-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 8px 0 #1a1e2b;
            pointer-events: none;
        }

        /* ইউজারনেম ইনপুট */
        .username-container {
            position: relative;
            margin-bottom: 18px;
        }
        .username-label {
            display: block;
            color: #ffd700;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .username-input {
            width: 100%;
            padding: 16px 20px;
            background: #1e2335;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 40px;
            font-size: 15px;
            color: white;
            box-shadow: inset 0 5px 8px rgba(0,0,0,0.3);
            padding-right: 70px;
        }
        .username-input:focus {
            outline: none;
            border-color: #ffd700;
        }
        .username-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .username-counter {
            position: absolute;
            right: 15px;
            bottom: 14px;
            background: rgba(255,215,0,0.2);
            color: #ffd700;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #ffd700;
            pointer-events: none;
        }

        /* টেলিগ্রাম ইনপুট */
        .input-group {
            margin-bottom: 18px;
        }
        .input-label {
            display: block;
            color: #ffd700;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: #1e2335;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 40px;
            font-size: 15px;
            color: white;
            box-shadow: inset 0 5px 8px rgba(0,0,0,0.3);
        }
        .input-field:focus {
            outline: none;
            border-color: #ffd700;
        }
        .input-field:disabled {
            opacity: 0.5;
            background: #2a2f40;
            cursor: not-allowed;
        }

        /* পেমেন্ট ড্রপডাউন */
        .payment-selector {
            position: relative;
            margin-bottom: 18px;
        }
        .payment-selected {
            width: 100%;
            padding: 16px 20px;
            background: #1e2335;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            cursor: pointer;
        }
        .payment-selected.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        .payment-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e2335;
            border-radius: 25px;
            margin-top: 5px;
            overflow: hidden;
            z-index: 100;
            display: none;
            border: 2px solid #ffd700;
            max-height: none;
        }
        .payment-dropdown.show {
            display: block;
        }
        .payment-option {
            padding: 14px 18px;
            color: white;
            border-bottom: 1px solid #333;
            cursor: pointer;
            font-size: 14px;
        }
        .payment-option:last-child {
            border-bottom: none;
        }
        .payment-option:active {
            background: #ffd700;
            color: #000;
        }
        .payment-option.inbox {
            background: rgba(76, 175, 80, 0.3);
            border-left: 6px solid #4CAF50;
            font-weight: bold;
        }
        .payment-option.disabled-option {
            opacity: 0.4;
            pointer-events: none;
        }

        /* সাবমিট বাটন */
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(145deg, #ffd700, #ffa500);
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            color: #000;
            box-shadow: 0 12px 0 #b27d00;
            cursor: pointer;
            transition: 0.1s;
            margin: 8px 0 16px 0;
        }
        .submit-btn:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #b27d00;
        }
        .submit-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 8px 0 #b27d00;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* প্রোগ্রেস বার */
        .progress-bar {
            height: 8px;
            background: #333;
            border-radius: 8px;
            overflow: hidden;
            margin: 15px 0;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffa500);
            width: 0%;
            transition: width 0.3s;
        }

        /* রেজাল্ট বক্স */
        .result-box {
            background: rgba(255,215,0,0.1);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #ffd700;
            display: none;
        }
        .result-box.show {
            display: block;
        }
        .success-text {
            color: #4CAF50;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .duplicate-text {
            color: #ffd700;
        }
        .receipt-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(145deg, #dc3545, #c82333);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 8px 0 #8b0000;
            transition: 0.1s;
        }
        .receipt-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #8b0000;
        }
        .receipt-details {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 15px;
            margin: 10px 0;
            font-size: 14px;
            color: #fff;
            line-height: 2;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .receipt-details div {
            display: flex;
            border-bottom: 1px dashed rgba(255,215,0,0.2);
            padding: 5px 0;
        }
        .receipt-details span.label {
            color: #ffd700;
            font-weight: bold;
            width: 100px;
        }
        .receipt-details span.value {
            color: #fff;
            flex: 1;
        }

        /* রুলস */
        .rules-card {
            background: rgba(20, 25, 40, 0.95);
            border-radius: 24px;
            padding: 16px;
            margin-top: 10px;
        }
        .rules-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .rule-item {
            background: rgba(255,255,255,0.03);
            padding: 10px 12px;
            border-radius: 16px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #fff;
        }
        .rule-icon {
            width: 22px;
            height: 22px;
            background: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 12px;
        }

        /* টোস্ট */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            left: 20px;
            background: #1e2335;
            color: white;
            padding: 14px 18px;
            border-radius: 30px;
            transform: translateY(-150%);
            transition: 0.3s;
            z-index: 9999;
            border-left: 6px solid;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            font-size: 14px;
        }
        .toast.show {
            transform: translateY(0);
        }
        .toast.success { border-left-color: #4CAF50; }
        .toast.error { border-left-color: #f44336; }
        .toast.warning { border-left-color: #ffd700; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="theme-toggle">
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>

    <div class="container">
        <!-- মেইন কার্ড -->
        <div class="main-card">
            <!-- স্টাইলিশ গোল্ড লোগো -->
            <div class="logo-area">
                <div class="gold-logo"> </div>
                <div class="gold-logo" style="font-size: 32px; margin-top: -5px;">EBH TEAM</div>
                <div class="logo-badge">✦ Earning By Habib  ✦</div>
            </div>

            <!-- মেইনটেন্যান্স নোটিশ - এখন সঠিকভাবে কাজ করবে -->
            <div id="maintenanceNotice" class="maintenance-notice">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="maintenanceMessageText">সিস্টেম বন্ধ আছে</span>
            </div>

            <!-- টাইপ সিলেক্টর -->
            <div class="type-row">
                <button class="type-btn cookies" onclick="selectType('cookies')" id="typeCookies">🍪 কুকিজ</button>
                <button class="type-btn twofa" onclick="selectType('2fa')" id="type2fa">🔐 2FA</button>
            </div>

            <!-- ইউজারনেম ইনপুট -->
            <div class="username-container">
                <label class="username-label">📝 ইউজারনেম (প্রতি লাইনে)</label>
                <textarea class="username-input" id="usernames" placeholder="username1&#10;username2" oninput="countAccounts()" rows="4"></textarea>
                <div class="username-counter" id="accountCount">০</div>
            </div>

            <!-- টেলিগ্রাম ইউজারনেম -->
            <div class="input-group">
                <label class="input-label">📱 টেলিগ্রাম ইউজারনেম</label>
                <input class="input-field" type="text" id="telegram" placeholder="@username" value="@">
            </div>

            <!-- পেমেন্ট মেথড -->
            <div class="input-group">
                <label class="input-label">💰 পেমেন্ট মেথড</label>
                <div class="payment-selector">
                    <div class="payment-selected" id="paymentSelected" onclick="togglePaymentDropdown()">
                        <span id="selectedPaymentText">সিলেক্ট করুন</span>
                        <span>▼</span>
                    </div>
                    <div class="payment-dropdown" id="paymentDropdown"></div>
                </div>
            </div>

            <!-- পেমেন্ট নাম্বার -->
            <div class="input-group">
                <label class="input-label">📞 পেমেন্ট নম্বর</label>
                <input class="input-field" type="text" id="number" placeholder="017xxxxxxxx">
            </div>

            <!-- প্রোগ্রেস বার -->
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <!-- সাবমিট বাটন -->
            <button class="submit-btn" onclick="submitData()" id="submitBtn">
                <i class="fas fa-paper-plane" style="margin-right: 8px;"></i>
                সাবমিট করুন
            </button>

            <!-- রেজাল্ট বক্স - PDF সহ -->
            <div class="result-box" id="resultBox">
                <div id="resultMessage"></div>
                <div class="receipt-details" id="receiptDetails"></div>
                <button class="receipt-btn" onclick="downloadPDF()" id="receiptBtn">
                    <i class="fas fa-file-pdf"></i>
                    PDF রিসিট ডাউনলোড করুন
                </button>
            </div>
        </div>

        <!-- রুলস -->
        <div class="rules-card">
            <div class="rules-title"><i class="fas fa-shield-alt"></i> নিয়মাবলী</div>
            <div class="rule-item"><div class="rule-icon">১</div>১০০ টাকার নিচে = মোবাইল রিচার্জ/বাইনান্স</div>
            <div class="rule-item"><div class="rule-icon">২</div>১০০ টাকার উপরে = বিকাশ/নগদ/রকেট</div>
            <div class="rule-item"><div class="rule-icon">৩</div>ডুপ্লিকেট অটো বাদ যাবে</div>
            <div class="rule-item"><div class="rule-icon">৪</div>টাকা পরে নিলে নাম্বার লাগবে না</div>
        </div>
    </div>

    <!-- টোস্ট -->
    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, push, query, orderByChild, equalTo, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // ফায়ারবেস কনফিগার (আপনার দেওয়া)
        const firebaseConfig = {
            apiKey: "AIzaSyCHqx6dAHeGFdtvY8682b_iQkdnk2ie0ug",
            authDomain: "saprahik-kaj.firebaseapp.com",
            databaseURL: "https://saprahik-kaj-default-rtdb.firebaseio.com",
            projectId: "saprahik-kaj",
            storageBucket: "saprahik-kaj.firebasestorage.app",
            messagingSenderId: "336661054558",
            appId: "1:336661054558:web:1beb394b660c9d6cf520cf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let selectedPayment = '';
        let selectedType = '';
        let lastSubmission = null;
        let systemEnabled = true; // ডিফল্ট true
        let maintenanceMessage = '';

        // ========== সিস্টেম স্ট্যাটাস চেক - এখন কাজ করবে ==========
        const systemRef = ref(db, 'settings/system');
        onValue(systemRef, (snapshot) => {
            const data = snapshot.val() || {};
            systemEnabled = data.enabled !== false; // false ছাড়া সব true
            maintenanceMessage = data.message || 'সিস্টেম মেইনটেন্যান্স মোডে আছে';
            
            console.log('System Status:', systemEnabled ? 'চালু' : 'বন্ধ', 'Message:', maintenanceMessage);
            
            updateUIBasedOnSystemStatus();
        });

        // ========== UI আপডেট ফাংশন (সিস্টেম স্ট্যাটাস অনুযায়ী) ==========
        function updateUIBasedOnSystemStatus() {
            const notice = document.getElementById('maintenanceNotice');
            const noticeText = document.getElementById('maintenanceMessageText');
            const submitBtn = document.getElementById('submitBtn');
            const typeBtns = document.querySelectorAll('.type-btn');
            const paymentSelected = document.getElementById('paymentSelected');
            const usernamesInput = document.getElementById('usernames');
            const telegramInput = document.getElementById('telegram');
            const numberInput = document.getElementById('number');
            const paymentOptions = document.querySelectorAll('.payment-option');
            
            if (!systemEnabled) {
                // সিস্টেম বন্ধ - সবকিছু নিষ্ক্রিয়
                notice.classList.add('show');
                noticeText.textContent = '⛔ ' + maintenanceMessage;
                
                submitBtn.disabled = true;
                
                typeBtns.forEach(btn => btn.disabled = true);
                
                if (paymentSelected) paymentSelected.classList.add('disabled');
                
                usernamesInput.disabled = true;
                telegramInput.disabled = true;
                numberInput.disabled = true;
                
                // ড্রপডাউন বন্ধ করা
                document.getElementById('paymentDropdown').classList.remove('show');
                
            } else {
                // সিস্টেম চালু - সবকিছু সক্রিয়
                notice.classList.remove('show');
                
                submitBtn.disabled = false;
                
                typeBtns.forEach(btn => btn.disabled = false);
                
                if (paymentSelected) paymentSelected.classList.remove('disabled');
                
                usernamesInput.disabled = false;
                telegramInput.disabled = false;
                numberInput.disabled = false; // ইনবক্স ছাড়া
            }
        }

        // ========== থিম ==========
        window.toggleTheme = function() {
            document.body.classList.toggle('light-mode');
            document.getElementById('themeBtn').textContent = 
                document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        };

        // ========== টাইপ সিলেক্ট ==========
        window.selectType = function(type) {
            if (!systemEnabled) {
                showToast('সিস্টেম বন্ধ আছে', 'warning');
                return;
            }
            selectedType = type;
            document.getElementById('typeCookies').classList.remove('active');
            document.getElementById('type2fa').classList.remove('active');
            document.getElementById('type' + (type === 'cookies' ? 'Cookies' : '2fa')).classList.add('active');
        };

        // ========== পেমেন্ট মেথড লোড ==========
        const paymentMethodsRef = ref(db, 'settings/paymentMethods');
        
        get(paymentMethodsRef).then((snapshot) => {
            if (!snapshot.exists()) {
                set(paymentMethodsRef, {
                    bkash: true, nagad: true, rocket: true,
                    mobileRecharge: true, binance: true,
                    bkashNagad: true, inbox: true
                });
            }
        });

        onValue(paymentMethodsRef, (snapshot) => {
            const methods = snapshot.val() || {};
            renderPaymentDropdown(methods);
        });

        function renderPaymentDropdown(methods) {
            const dropdown = document.getElementById('paymentDropdown');
            dropdown.innerHTML = '';

            const methodList = [
                { id: 'inbox', name: '📨 টাকা পরে নেব (ইনবক্সে হিসাব দিন)', class: 'inbox' },
                { id: 'bkash', name: '💳 বিকাশ' },
                { id: 'nagad', name: '💵 নগদ' },
                { id: 'bkashNagad', name: '💳+💵 বিকাশ+নগদ একই নাম্বার' },
                { id: 'rocket', name: '🚀 রকেট' },
                { id: 'mobileRecharge', name: '📱 মোবাইল রিচার্জ' },
                { id: 'binance', name: '₿ বাইন্যান্স' }
            ];

            methodList.forEach(method => {
                const div = document.createElement('div');
                div.className = 'payment-option' + (method.class ? ' ' + method.class : '');
                
                if (methods[method.id] === false) {
                    div.classList.add('disabled-option');
                } else {
                    div.onclick = () => {
                        if (!systemEnabled) {
                            showToast('সিস্টেম বন্ধ আছে', 'warning');
                            return;
                        }
                        selectedPayment = method.name;
                        document.getElementById('selectedPaymentText').textContent = method.name;
                        document.getElementById('paymentDropdown').classList.remove('show');
                        
                        const numberField = document.getElementById('number');
                        if (method.id === 'inbox') {
                            numberField.disabled = true;
                            numberField.value = 'ইনবক্সে দেওয়া হবে';
                            numberField.placeholder = 'নাম্বার লাগবে না';
                        } else {
                            numberField.disabled = false;
                            numberField.value = '';
                            numberField.placeholder = '017xxxxxxxx';
                        }
                    };
                }
                div.textContent = method.name;
                dropdown.appendChild(div);
            });
        }

        window.togglePaymentDropdown = function() {
            if (!systemEnabled) {
                showToast('সিস্টেম বন্ধ আছে', 'warning');
                return;
            }
            document.getElementById('paymentDropdown').classList.toggle('show');
        };

        document.addEventListener('click', function(event) {
            if (!event.target.closest('.payment-selector')) {
                document.getElementById('paymentDropdown').classList.remove('show');
            }
        });

        window.countAccounts = function() {
            const text = document.getElementById('usernames').value;
            const count = text.split('\n').filter(line => line.trim() !== '').length;
            document.getElementById('accountCount').textContent = count;
        };

        // ========== PDF ডাউনলোড (ইংরেজি) ==========
        window.downloadPDF = function() {
            if (!lastSubmission) {
                showToast('কোন রিসিট নেই', 'warning');
                return;
            }

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'a4'
                });
                
                doc.setFillColor(10, 15, 30);
                doc.rect(0, 0, 210, 297, 'F');
                
                doc.setFont("helvetica", "bold");
                
                doc.setFontSize(32);
                doc.setTextColor(255, 215, 0);
                doc.text("EARNING BY HABIB", 105, 30, { align: "center" });
                
                doc.setFontSize(24);
                doc.setTextColor(255, 255, 255);
                doc.text("EBH TEAM", 105, 45, { align: "center" });
                
                doc.setDrawColor(255, 215, 0);
                doc.setLineWidth(0.5);
                doc.line(30, 55, 180, 55);
                
                let accountTypeEnglish = lastSubmission.typeName === 'কুকিজ' ? 'COOKIES' : '2FA';
                let paymentMethodEnglish = lastSubmission.paymentMethod;
                if (paymentMethodEnglish.includes('ইনবক্স')) paymentMethodEnglish = 'Inbox Payment';
                else if (paymentMethodEnglish.includes('বিকাশ')) paymentMethodEnglish = 'bKash';
                else if (paymentMethodEnglish.includes('নগদ')) paymentMethodEnglish = 'Nagad';
                else if (paymentMethodEnglish.includes('রকেট')) paymentMethodEnglish = 'Rocket';
                else if (paymentMethodEnglish.includes('মোবাইল রিচার্জ')) paymentMethodEnglish = 'Mobile Recharge';
                else if (paymentMethodEnglish.includes('বাইন্যান্স')) paymentMethodEnglish = 'Binance';
                else if (paymentMethodEnglish.includes('বিকাশ+নগদ')) paymentMethodEnglish = 'bKash + Nagad (Same Number)';
                
                let numberEnglish = lastSubmission.number.includes('ইনবক্সে') ? 'Inbox Payment' : lastSubmission.number;
                
                doc.setFontSize(14);
                let y = 70;
                const lineHeight = 10;
                
                doc.setTextColor(255, 215, 0); doc.text("TELEGRAM:", 25, y); doc.setTextColor(255,255,255); doc.text(lastSubmission.telegram, 80, y); y += lineHeight;
                doc.setTextColor(255,215,0); doc.text("ACCOUNT TYPE:", 25, y); doc.setTextColor(255,255,255); doc.text(accountTypeEnglish, 80, y); y += lineHeight;
                doc.setTextColor(255,215,0); doc.text("SUCCESSFUL:", 25, y); doc.setTextColor(76,175,80); doc.text(lastSubmission.uniqueCount + " Accounts", 80, y); y += lineHeight;
                if (lastSubmission.duplicateCount > 0) {
                    doc.setTextColor(255,215,0); doc.text("DUPLICATE:", 25, y); doc.setTextColor(255,215,0); doc.text(lastSubmission.duplicateCount + " Accounts", 80, y); y += lineHeight;
                }
                doc.setTextColor(255,215,0); doc.text("PAYMENT:", 25, y); doc.setTextColor(255,255,255); doc.text(paymentMethodEnglish, 80, y); y += lineHeight;
                doc.setTextColor(255,215,0); doc.text("NUMBER:", 25, y); doc.setTextColor(255,255,255); doc.text(numberEnglish, 80, y); y += lineHeight;
                
                const timeStr = new Date(lastSubmission.timestamp).toLocaleString('en-US', { timeZone:'Asia/Dhaka', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true });
                doc.setTextColor(255,215,0); doc.text("TIME:", 25, y); doc.setTextColor(255,255,255); doc.text(timeStr + " (BDT)", 80, y); y += lineHeight + 5;
                
                doc.setDrawColor(255,215,0); doc.line(30, y-2, 180, y-2);
                
                doc.setFontSize(14); doc.setTextColor(255,215,0); doc.text("USERNAMES:", 25, y+5); y += 12;
                doc.setFontSize(10); doc.setTextColor(200,200,200);
                let usernameList = lastSubmission.usernames;
                for (let i = 0; i < Math.min(usernameList.length, 20); i++) { doc.text("• " + usernameList[i], 30, y); y += 6; }
                if (usernameList.length > 20) { doc.setTextColor(255,215,0); doc.text("... and " + (usernameList.length - 20) + " more", 30, y); }
                
                y = 250;
                doc.setDrawColor(255,215,0); doc.line(30, y, 180, y); y += 8;
                doc.setFontSize(16); doc.setTextColor(255,215,0); doc.text("Thank You!", 105, y, { align: "center" }); y += 8;
                doc.setFontSize(12); doc.setTextColor(255,255,255); doc.text("For working with us", 105, y, { align: "center" }); y += 8;
                doc.setFontSize(10); doc.setTextColor(150,150,150); doc.text("EBH TEAM - EARNING BY HABIB", 105, y, { align: "center" });
                
                const fileName = `EBH_Receipt_${lastSubmission.telegram.replace('@', '')}_${Date.now()}.pdf`;
                doc.save(fileName);
                showToast('PDF ডাউনলোড শুরু হয়েছে', 'success');
                
            } catch (error) {
                console.error('PDF error:', error);
                showToast('PDF তৈরি করতে সমস্যা', 'error');
            }
        };

        // ========== ডুপ্লিকেট চেক ==========
        async function checkBulkDuplicates(usernames) {
            const uniqueSet = new Set();
            const duplicates = new Set();
            usernames.forEach(u => { if (uniqueSet.has(u)) duplicates.add(u); else uniqueSet.add(u); });
            const uniqueUsernames = Array.from(uniqueSet);
            const dbDuplicates = new Set();
            const batchChecks = uniqueUsernames.map(username => 
                get(query(ref(db, 'submits'), orderByChild('username'), equalTo(username)))
                    .then(snapshot => snapshot.exists() ? username : null)
            );
            const results = await Promise.all(batchChecks);
            results.forEach(u => { if (u) dbDuplicates.add(u); });
            const finalUnique = uniqueUsernames.filter(u => !dbDuplicates.has(u));
            return {
                duplicates: Array.from(new Set([...duplicates, ...dbDuplicates])),
                uniqueUsernames: finalUnique
            };
        }

        // ========== সাবমিট ==========
        async function batchSubmit(usernames, telegram, paymentMethod, number) {
            const timestamp = Date.now();
            const promises = usernames.map(username => 
                push(ref(db, 'submits'), {
                    username,
                    telegram: telegram.replace('@', ''),
                    paymentMethod,
                    number,
                    timestamp,
                    status: 'pending',
                    type: selectedType
                })
            );
            await Promise.all(promises);
            return timestamp;
        }

        // ========== মেইন সাবমিট ==========
        window.submitData = async function() {
            // সিস্টেম চেক - প্রথমেই
            if (!systemEnabled) {
                showToast('সিস্টেম বন্ধ আছে: ' + maintenanceMessage, 'warning');
                return;
            }

            if (!selectedType) {
                showToast('কুকিজ বা 2FA সিলেক্ট করুন', 'warning');
                return;
            }

            const usernamesText = document.getElementById('usernames').value;
            let telegram = document.getElementById('telegram').value.trim();
            let number = document.getElementById('number').value.trim();

            if (telegram && !telegram.startsWith('@')) telegram = '@' + telegram;

            if (!selectedPayment || !usernamesText || !telegram) {
                showToast('সব ফিল্ড পূরণ করুন', 'warning');
                return;
            }

            if (telegram === '@' || telegram.length < 2) {
                showToast('সঠিক টেলিগ্রাম দিন', 'warning');
                return;
            }

            const isInboxPayment = selectedPayment.includes('ইনবক্স');
            
            if (!isInboxPayment && !number) {
                showToast('পেমেন্ট নাম্বার দিন', 'warning');
                return;
            }

            if (isInboxPayment) number = 'ইনবক্সে দেওয়া হবে';

            const usernames = usernamesText.split('\n').map(u => u.trim()).filter(u => u);
            if (usernames.length === 0) {
                showToast('কমপক্ষে একটি ইউজারনেম দিন', 'warning');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> প্রসেসিং...';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';

            try {
                const { duplicates, uniqueUsernames } = await checkBulkDuplicates(usernames);
                progressFill.style.width = '70%';

                let timestamp = null;
                if (uniqueUsernames.length > 0) {
                    timestamp = await batchSubmit(uniqueUsernames, telegram, selectedPayment, number);
                }

                const typeName = selectedType === 'cookies' ? 'কুকিজ' : '2FA';
                
                lastSubmission = {
                    telegram,
                    typeName,
                    uniqueCount: uniqueUsernames.length,
                    duplicateCount: duplicates.length,
                    paymentMethod: selectedPayment,
                    number,
                    timestamp: timestamp || Date.now(),
                    usernames: uniqueUsernames
                };

                const resultBox = document.getElementById('resultBox');
                const resultMessage = document.getElementById('resultMessage');
                const receiptDetails = document.getElementById('receiptDetails');
                
                if (uniqueUsernames.length === 0) {
                    resultMessage.innerHTML = '<span class="duplicate-text">⚠️ সব ইউজারনেম ডুপ্লিকেট!</span>';
                    receiptDetails.innerHTML = '';
                } else {
                    resultMessage.innerHTML = `
                        <span class="success-text">✅ ${uniqueUsernames.length} টি ${typeName} সেভ হয়েছে</span>
                        ${duplicates.length > 0 ? `<br><span class="duplicate-text">⚠️ ${duplicates.length} টি ডুপ্লিকেট</span>` : ''}
                    `;
                    
                    receiptDetails.innerHTML = `
                        <div><span class="label">👤 টেলিগ্রাম:</span> <span class="value">${telegram}</span></div>
                        <div><span class="label">📊 টাইপ:</span> <span class="value">${typeName}</span></div>
                        <div><span class="label">✅ সফল:</span> <span class="value">${uniqueUsernames.length} টি</span></div>
                        ${duplicates.length > 0 ? `<div><span class="label">⚠️ ডুপ্লিকেট:</span> <span class="value">${duplicates.length} টি</span></div>` : ''}
                        <div><span class="label">💰 পেমেন্ট:</span> <span class="value">${selectedPayment}</span></div>
                        <div><span class="label">📞 নাম্বার:</span> <span class="value">${number}</span></div>
                        <div><span class="label">⏰ সময়:</span> <span class="value">${new Date().toLocaleString('bn-BD')}</span></div>
                    `;
                }
                
                resultBox.classList.add('show');

                if (uniqueUsernames.length > 0) {
                    showToast(`${uniqueUsernames.length} টি একাউন্ট সেভ হয়েছে`, 'success');
                    
                    document.getElementById('usernames').value = '';
                    document.getElementById('accountCount').textContent = '০';
                    document.getElementById('telegram').value = '@';
                    document.getElementById('number').value = '';
                    document.getElementById('number').disabled = false;
                    selectedPayment = '';
                    selectedType = '';
                    document.getElementById('typeCookies').classList.remove('active');
                    document.getElementById('type2fa').classList.remove('active');
                    document.getElementById('selectedPaymentText').textContent = 'সিলেক্ট করুন';
                }

            } catch (error) {
                console.error('Error:', error);
                showToast('সমস্যা: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> সাবমিট করুন';
                progressBar.style.display = 'none';
            }
        };

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type} show`;
            toast.innerHTML = message;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        countAccounts();
    </script>
</body>
</html>
