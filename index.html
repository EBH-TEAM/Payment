<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EBH TEAM | পেমেন্ট সিস্টেম</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0f1e;
            min-height: 100vh;
            padding: 12px;
        }

        /* লাইট মোড */
        body.light-mode {
            background: #f0f4fa;
        }
        body.light-mode .main-card {
            background: rgba(255,255,255,0.95);
            border-color: rgba(0,0,0,0.1);
        }
        body.light-mode .input-field {
            background: #f5f7fb;
            border-color: #ddd;
            color: #333;
        }
        body.light-mode .rule-item {
            background: #f8f9ff;
            color: #333;
        }

        /* থিম টগল */
        .theme-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1000;
        }
        .theme-btn {
            width: 44px;
            height: 44px;
            border-radius: 30px;
            background: rgba(255,215,0,0.2);
            border: 1px solid #ffd700;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            color: #ffd700;
        }

        /* মেইন কন্টেইনার */
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding-top: 20px;
        }

        /* মেইন কার্ড */
        .main-card {
            background: rgba(20, 25, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 22px 18px;
            border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* লোগো */
        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-text {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(145deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        /* টাইপ সিলেক্টর */
        .type-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .type-btn {
            flex: 1;
            padding: 16px 8px;
            border-radius: 40px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            border: none;
            background: #2d3349;
            color: white;
            box-shadow: 0 8px 0 #1a1e2b;
            transition: 0.1s;
            cursor: pointer;
        }
        .type-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #1a1e2b;
        }
        .type-btn.cookies.active {
            background: #ff4757;
        }
        .type-btn.twofa.active {
            background: #4834d4;
        }

        /* ইউজারনেম ইনপুট - কাউন্টার সহ */
        .username-container {
            position: relative;
            margin-bottom: 18px;
        }
        .username-label {
            display: block;
            color: #ffd700;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .username-input {
            width: 100%;
            padding: 16px 20px;
            background: #1e2335;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 40px;
            font-size: 15px;
            color: white;
            box-shadow: inset 0 5px 8px rgba(0,0,0,0.3);
            padding-right: 70px;
        }
        .username-input:focus {
            outline: none;
            border-color: #ffd700;
        }
        .username-counter {
            position: absolute;
            right: 15px;
            bottom: 14px;
            background: rgba(255,215,0,0.2);
            color: #ffd700;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #ffd700;
            pointer-events: none;
        }

        /* টেলিগ্রাম ইনপুট */
        .input-group {
            margin-bottom: 18px;
        }
        .input-label {
            display: block;
            color: #ffd700;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: #1e2335;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 40px;
            font-size: 15px;
            color: white;
            box-shadow: inset 0 5px 8px rgba(0,0,0,0.3);
        }
        .input-field:focus {
            outline: none;
            border-color: #ffd700;
        }
        .input-field:disabled {
            opacity: 0.5;
            background: #2a2f40;
        }

        /* পেমেন্ট ড্রপডাউন - স্ক্রোল ছাড়া */
        .payment-selector {
            position: relative;
            margin-bottom: 18px;
        }
        .payment-selected {
            width: 100%;
            padding: 16px 20px;
            background: #1e2335;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            cursor: pointer;
        }
        .payment-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e2335;
            border-radius: 25px;
            margin-top: 5px;
            overflow: hidden;
            z-index: 100;
            display: none;
            border: 2px solid #ffd700;
            max-height: none;
        }
        .payment-dropdown.show {
            display: block;
        }
        .payment-option {
            padding: 14px 18px;
            color: white;
            border-bottom: 1px solid #333;
            cursor: pointer;
            font-size: 14px;
        }
        .payment-option:last-child {
            border-bottom: none;
        }
        .payment-option:active {
            background: #ffd700;
            color: #000;
        }
        .payment-option.inbox {
            background: rgba(76, 175, 80, 0.3);
            border-left: 6px solid #4CAF50;
            font-weight: bold;
        }

        /* সাবমিট বাটন */
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(145deg, #ffd700, #ffa500);
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            color: #000;
            box-shadow: 0 12px 0 #b27d00;
            cursor: pointer;
            transition: 0.1s;
            margin: 8px 0 16px 0;
        }
        .submit-btn:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #b27d00;
        }
        .submit-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 8px 0 #b27d00;
        }

        /* প্রোগ্রেস বার */
        .progress-bar {
            height: 8px;
            background: #333;
            border-radius: 8px;
            overflow: hidden;
            margin: 15px 0;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffa500);
            width: 0%;
            transition: width 0.3s;
        }

        /* রেজাল্ট বক্স */
        .result-box {
            background: rgba(255,215,0,0.1);
            border-radius: 20px;
            padding: 12px 15px;
            margin: 10px 0;
            border-left: 4px solid #ffd700;
            display: none;
            font-size: 14px;
        }
        .result-box.show {
            display: block;
        }
        .success-text {
            color: #4CAF50;
            font-weight: bold;
        }
        .duplicate-text {
            color: #ffd700;
        }

        /* রুলস */
        .rules-card {
            background: rgba(20, 25, 40, 0.95);
            border-radius: 24px;
            padding: 16px;
            margin-top: 10px;
        }
        .rules-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .rule-item {
            background: rgba(255,255,255,0.03);
            padding: 10px 12px;
            border-radius: 16px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #fff;
        }
        .rule-icon {
            width: 22px;
            height: 22px;
            background: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 12px;
        }

        /* টোস্ট */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            left: 20px;
            background: #1e2335;
            color: white;
            padding: 14px 18px;
            border-radius: 30px;
            transform: translateY(-150%);
            transition: 0.3s;
            z-index: 9999;
            border-left: 6px solid;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            font-size: 14px;
        }
        .toast.show {
            transform: translateY(0);
        }
        .toast.success { border-left-color: #4CAF50; }
        .toast.error { border-left-color: #f44336; }
        .toast.warning { border-left-color: #ffd700; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="theme-toggle">
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>

    <div class="container">
        <!-- মেইন কার্ড -->
        <div class="main-card">
            <!-- লোগো -->
            <div class="logo-area">
                <div class="logo-text">EBH TEAM</div>
            </div>

            <!-- মেইনটেন্যান্স - হিডেন -->
            <div id="maintenanceNotice" style="display:none;"></div>

            <!-- টাইপ সিলেক্টর -->
            <div class="type-row">
                <button class="type-btn cookies" onclick="selectType('cookies')" id="typeCookies">🍪 কুকিজ</button>
                <button class="type-btn twofa" onclick="selectType('2fa')" id="type2fa">🔐 2FA</button>
            </div>

            <!-- ইউজারনেম ইনপুট - কাউন্টার ইনপুটের ভিতরে -->
            <div class="username-container">
                <label class="username-label">📝 ইউজারনেম (প্রতি লাইনে একটি)</label>
                <textarea class="username-input" id="usernames" placeholder="username1&#10;username2" oninput="countAccounts()" rows="4"></textarea>
                <div class="username-counter" id="accountCount">০</div>
            </div>

            <!-- টেলিগ্রাম ইউজারনেম -->
            <div class="input-group">
                <label class="input-label">📱 টেলিগ্রাম ইউজারনেম</label>
                <input class="input-field" type="text" id="telegram" placeholder="@username" value="@">
            </div>

            <!-- পেমেন্ট মেথড -->
            <div class="input-group">
                <label class="input-label">💰 পেমেন্ট মেথড</label>
                <div class="payment-selector">
                    <div class="payment-selected" onclick="togglePaymentDropdown()">
                        <span id="selectedPaymentText">সিলেক্ট করুন</span>
                        <span>▼</span>
                    </div>
                    <div class="payment-dropdown" id="paymentDropdown"></div>
                </div>
            </div>

            <!-- পেমেন্ট নাম্বার -->
            <div class="input-group">
                <label class="input-label">📞 পেমেন্ট নম্বর</label>
                <input class="input-field" type="text" id="number" placeholder="017xxxxxxxx">
            </div>

            <!-- প্রোগ্রেস বার -->
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <!-- সাবমিট বাটন -->
            <button class="submit-btn" onclick="submitData()" id="submitBtn">
                <i class="fas fa-paper-plane" style="margin-right: 8px;"></i>
                সাবমিট করুন
            </button>

            <!-- রেজাল্ট (ছোট) -->
            <div class="result-box" id="resultBox">
                <div id="resultMessage"></div>
            </div>
        </div>

        <!-- রুলস -->
        <div class="rules-card">
            <div class="rules-title"><i class="fas fa-shield-alt"></i> নিয়মাবলী</div>
            <div class="rule-item"><div class="rule-icon">১</div>১০০ টাকার নিচে = মোবাইল রিচার্জ/বাইনান্স</div>
            <div class="rule-item"><div class="rule-icon">২</div>১০০ টাকার উপরে = বিকাশ/নগদ/রকেট</div>
            <div class="rule-item"><div class="rule-icon">৩</div>ডুপ্লিকেট অটো বাদ যাবে</div>
            <div class="rule-item"><div class="rule-icon">৪</div>টাকা পরে নিলে নাম্বার লাগবে না</div>
        </div>
    </div>

    <!-- টোস্ট -->
    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, push, query, orderByChild, equalTo, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // ফায়ারবেস কনফিগার
        const firebaseConfig = {
            apiKey: "AIzaSyCHqx6dAHeGFdtvY8682b_iQkdnk2ie0ug",
            authDomain: "saprahik-kaj.firebaseapp.com",
            databaseURL: "https://saprahik-kaj-default-rtdb.firebaseio.com",
            projectId: "saprahik-kaj",
            storageBucket: "saprahik-kaj.firebasestorage.app",
            messagingSenderId: "336661054558",
            appId: "1:336661054558:web:1beb394b660c9d6cf520cf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // টেলিগ্রাম বট টোকেন
        const BOT_TOKEN = "8625252484:AAECj4HGHWwaslgKSqGOyg05T4wz4YMGXC0";
        
        // ⚡⚡⚡ এই লাইনটা true করে দিলাম - এখন টেলিগ্রাম বট চালু! ⚡⚡⚡
        const USE_TELEGRAM = true;

        let selectedPayment = '';
        let selectedType = '';

        // ========== থিম ==========
        window.toggleTheme = function() {
            document.body.classList.toggle('light-mode');
            document.getElementById('themeBtn').textContent = 
                document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        };

        // ========== টাইপ সিলেক্ট ==========
        window.selectType = function(type) {
            selectedType = type;
            document.getElementById('typeCookies').classList.remove('active');
            document.getElementById('type2fa').classList.remove('active');
            document.getElementById('type' + (type === 'cookies' ? 'Cookies' : '2fa')).classList.add('active');
        };

        // ========== পেমেন্ট মেথড লোড ==========
        const paymentMethodsRef = ref(db, 'settings/paymentMethods');
        
        get(paymentMethodsRef).then((snapshot) => {
            if (!snapshot.exists()) {
                set(paymentMethodsRef, {
                    bkash: true, nagad: true, rocket: true,
                    mobileRecharge: true, binance: true,
                    bkashNagad: true, inbox: true
                });
            }
        });

        onValue(paymentMethodsRef, (snapshot) => {
            const methods = snapshot.val() || {};
            renderPaymentDropdown(methods);
        });

        function renderPaymentDropdown(methods) {
            const dropdown = document.getElementById('paymentDropdown');
            dropdown.innerHTML = '';

            // 'টাকা পরে নেব' প্রথমে রাখলাম
            const methodList = [
                { id: 'inbox', name: '📨 টাকা পরে নেব (ইনবক্সে হিসাব দিন)', class: 'inbox' },
                { id: 'bkash', name: '💳 বিকাশ' },
                { id: 'nagad', name: '💵 নগদ' },
                { id: 'bkashNagad', name: '💳+💵 বিকাশ+নগদ একই নাম্বার' },
                { id: 'rocket', name: '🚀 রকেট' },
                { id: 'mobileRecharge', name: '📱 মোবাইল রিচার্জ' },
                { id: 'binance', name: '₿ বাইন্যান্স' }
            ];

            methodList.forEach(method => {
                const div = document.createElement('div');
                div.className = 'payment-option' + (method.class ? ' ' + method.class : '');
                
                if (methods[method.id] !== false) {
                    div.onclick = () => {
                        selectedPayment = method.name;
                        document.getElementById('selectedPaymentText').textContent = method.name;
                        document.getElementById('paymentDropdown').classList.remove('show');
                        
                        const numberField = document.getElementById('number');
                        if (method.id === 'inbox') {
                            numberField.disabled = true;
                            numberField.value = 'ইনবক্সে দেওয়া হবে';
                            numberField.placeholder = 'নাম্বার লাগবে না';
                        } else {
                            numberField.disabled = false;
                            numberField.value = '';
                            numberField.placeholder = '017xxxxxxxx';
                        }
                    };
                } else {
                    div.style.opacity = '0.4';
                    div.style.pointerEvents = 'none';
                }
                div.textContent = method.name;
                dropdown.appendChild(div);
            });
        }

        window.togglePaymentDropdown = function() {
            document.getElementById('paymentDropdown').classList.toggle('show');
        };

        document.addEventListener('click', function(event) {
            if (!event.target.closest('.payment-selector')) {
                document.getElementById('paymentDropdown').classList.remove('show');
            }
        });

        // ========== কাউন্ট আপডেট ==========
        window.countAccounts = function() {
            const text = document.getElementById('usernames').value;
            const count = text.split('\n').filter(line => line.trim() !== '').length;
            document.getElementById('accountCount').textContent = count;
        };

        // ========== টেলিগ্রাম কনফার্মেশন (এখন চালু) ==========
        async function sendTelegramConfirmation(telegram, uniqueCount, duplicateCount, typeName, isInbox) {
            if (!USE_TELEGRAM) return;
            
            try {
                const cleanUsername = telegram.replace('@', '').toLowerCase();
                
                // চ্যাট আইডি খুঁজি
                const chatIdRef = ref(db, 'chatIds/' + cleanUsername);
                let chatId = null;
                
                const snapshot = await get(chatIdRef);
                if (snapshot.exists()) {
                    chatId = snapshot.val();
                }

                if (!chatId) {
                    console.log('চ্যাট আইডি নেই - ইউজার বট স্টার্ট করেনি');
                    showToast('কনফার্মেশন পেতে @ebh_confirmation_bot এ /start দিন', 'warning');
                    return;
                }

                // মেসেজ
                let message = '';
                if (isInbox) {
                    message = `📨 *EBH TEAM - কনফার্মেশন*\n\nআপনার *${uniqueCount}* টি *${typeName}* একাউন্ট সফলভাবে জমা হয়েছে।\n💬 পেমেন্ট ইনবক্সে দেওয়া হবে।\n\nধন্যবাদ! 🙏`;
                } else {
                    message = `✅ *EBH TEAM - কনফার্মেশন*\n\nআপনার *${uniqueCount}* টি *${typeName}* একাউন্ট সফলভাবে জমা হয়েছে।${duplicateCount > 0 ? '\n⚠️ *' + duplicateCount + '* টি ডুপ্লিকেট বাদ দেওয়া হয়েছে' : ''}\n\nধন্যবাদ! 🙏`;
                }

                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        chat_id: chatId, 
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                const result = await response.json();
                if (result.ok) {
                    console.log('✅ কনফার্মেশন পাঠানো হয়েছে');
                } else {
                    console.log('টেলিগ্রাম error:', result);
                }

            } catch (error) {
                console.error('Telegram error:', error);
            }
        }

        // ========== ডুপ্লিকেট চেক ==========
        async function checkBulkDuplicates(usernames) {
            const uniqueSet = new Set();
            const duplicates = new Set();
            
            usernames.forEach(u => {
                if (uniqueSet.has(u)) duplicates.add(u);
                else uniqueSet.add(u);
            });

            const uniqueUsernames = Array.from(uniqueSet);
            
            const dbDuplicates = new Set();
            const batchChecks = uniqueUsernames.map(username => 
                get(query(ref(db, 'submits'), orderByChild('username'), equalTo(username)))
                    .then(snapshot => snapshot.exists() ? username : null)
            );
            
            const results = await Promise.all(batchChecks);
            results.forEach(u => { if (u) dbDuplicates.add(u); });

            const finalUnique = uniqueUsernames.filter(u => !dbDuplicates.has(u));
            
            return {
                duplicates: Array.from(new Set([...duplicates, ...dbDuplicates])),
                uniqueUsernames: finalUnique
            };
        }

        // ========== সাবমিট ==========
        async function batchSubmit(usernames, telegram, paymentMethod, number) {
            const timestamp = Date.now();
            const promises = usernames.map(username => 
                push(ref(db, 'submits'), {
                    username,
                    telegram: telegram.replace('@', ''),
                    paymentMethod,
                    number,
                    timestamp,
                    status: 'pending',
                    type: selectedType
                })
            );
            await Promise.all(promises);
        }

        // ========== মেইন সাবমিট ==========
        window.submitData = async function() {
            if (!selectedType) {
                showToast('কুকিজ বা 2FA সিলেক্ট করুন', 'warning');
                return;
            }

            const usernamesText = document.getElementById('usernames').value;
            let telegram = document.getElementById('telegram').value.trim();
            let number = document.getElementById('number').value.trim();

            // টেলিগ্রাম ফরম্যাট
            if (telegram && !telegram.startsWith('@')) {
                telegram = '@' + telegram;
            }

            if (!selectedPayment || !usernamesText || !telegram) {
                showToast('সব ফিল্ড পূরণ করুন', 'warning');
                return;
            }

            if (telegram === '@' || telegram.length < 2) {
                showToast('সঠিক টেলিগ্রাম দিন', 'warning');
                return;
            }

            const isInboxPayment = selectedPayment.includes('ইনবক্স');
            
            if (!isInboxPayment && !number) {
                showToast('পেমেন্ট নাম্বার দিন', 'warning');
                return;
            }

            if (isInboxPayment) number = 'ইনবক্সে দেওয়া হবে';

            const usernames = usernamesText.split('\n').map(u => u.trim()).filter(u => u);
            if (usernames.length === 0) {
                showToast('কমপক্ষে একটি ইউজারনেম দিন', 'warning');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> প্রসেসিং...';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';

            try {
                const { duplicates, uniqueUsernames } = await checkBulkDuplicates(usernames);
                progressFill.style.width = '70%';

                if (uniqueUsernames.length > 0) {
                    await batchSubmit(uniqueUsernames, telegram, selectedPayment, number);
                }

                const typeName = selectedType === 'cookies' ? 'কুকিজ' : '2FA';
                
                const resultBox = document.getElementById('resultBox');
                const resultMessage = document.getElementById('resultMessage');
                
                if (uniqueUsernames.length === 0) {
                    resultMessage.innerHTML = '<span class="duplicate-text">⚠️ সব ইউজারনেম ডুপ্লিকেট!</span>';
                } else {
                    resultMessage.innerHTML = `
                        <span class="success-text">✅ ${uniqueUsernames.length} টি ${typeName} সেভ হয়েছে</span>
                        ${duplicates.length > 0 ? `<br><span class="duplicate-text">⚠️ ${duplicates.length} টি ডুপ্লিকেট</span>` : ''}
                    `;
                }
                
                resultBox.classList.add('show');

                if (uniqueUsernames.length > 0) {
                    showToast(`${uniqueUsernames.length} টি একাউন্ট সেভ হয়েছে`, 'success');
                    
                    // টেলিগ্রামে পাঠানোর চেষ্টা (এখন চালু)
                    await sendTelegramConfirmation(
                        telegram, 
                        uniqueUsernames.length, 
                        duplicates.length, 
                        typeName,
                        isInboxPayment
                    );
                    
                    // ফর্ম ক্লিয়ার
                    document.getElementById('usernames').value = '';
                    document.getElementById('accountCount').textContent = '০';
                    document.getElementById('telegram').value = '@';
                    document.getElementById('number').value = '';
                    document.getElementById('number').disabled = false;
                    selectedPayment = '';
                    selectedType = '';
                    document.getElementById('typeCookies').classList.remove('active');
                    document.getElementById('type2fa').classList.remove('active');
                    document.getElementById('selectedPaymentText').textContent = 'সিলেক্ট করুন';
                }

            } catch (error) {
                console.error('Error:', error);
                showToast('সমস্যা: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> সাবমিট করুন';
                progressBar.style.display = 'none';
            }
        };

        // ========== টোস্ট ==========
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type} show`;
            toast.innerHTML = message;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ইনিশিয়াল কাউন্ট
        countAccounts();
    </script>
</body>
</html>
