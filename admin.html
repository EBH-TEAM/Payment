<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBH Team - অ্যাডমিন প্যানেল ⚡</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1e2b 0%, #2d3349 100%);
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: #2d3349;
            padding: 20px 25px;
            border-radius: 50px;
            box-shadow: 
                15px 15px 30px rgba(0,0,0,0.5),
                inset 2px 2px 5px rgba(255,255,255,0.1),
                inset -3px -3px 8px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.2);
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: 36px;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(145deg, #ffd700, #ffa500, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 5px 15px rgba(255,215,0,0.3),
                2px 2px 0 #00000030;
        }

        .stats-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .stat-box {
            background: rgba(255,215,0,0.1);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #ffd700;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-box span {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
        }

        .stat-box label {
            color: #fff;
            font-size: 14px;
        }

        .refresh-buttons {
            display: flex;
            gap: 8px;
        }

        .refresh-btn {
            background: linear-gradient(145deg, #ffd700, #ffa500);
            color: #1a1e2b;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 
                5px 5px 10px rgba(0,0,0,0.4),
                inset -2px -2px 5px rgba(0,0,0,0.2),
                inset 2px 2px 5px rgba(255,255,255,0.3);
            transition: 0.2s;
            height: 48px;
            min-width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .refresh-btn.small {
            background: linear-gradient(145deg, #3498db, #2980b9);
            color: white;
            min-width: 80px;
            padding: 8px 15px;
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        .refresh-btn i {
            font-size: 16px;
        }

        .money-stats {
            display: flex;
            gap: 15px;
            background: rgba(255,215,0,0.15);
            padding: 8px 25px;
            border-radius: 40px;
            border: 1px solid #ffd700;
            font-weight: bold;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .money-pending {
            color: #ffa502;
            font-size: 18px;
        }

        .money-approved {
            color: #26de81;
            font-size: 18px;
        }

        .money-pending strong, .money-approved strong {
            color: #ffd700;
            font-size: 22px;
            margin-left: 5px;
        }

        .finance-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .finance-box {
            flex: 1;
            min-width: 200px;
            background: linear-gradient(145deg, #2d3349, #1a1e2b);
            padding: 15px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.4);
        }

        .finance-box.received {
            border: 2px solid #ffd700;
        }

        .finance-box.profit {
            border: 2px solid #4CAF50;
        }

        .finance-box .label {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .finance-box.received .label {
            color: #ffd700;
        }

        .finance-box.profit .label {
            color: #4CAF50;
        }

        .finance-box .amount {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .filter-indicator {
            background: rgba(255,215,0,0.1);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid #ffd700;
            color: #ffd700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .main-tab {
            flex: 1;
            padding: 15px 20px;
            border-radius: 40px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.3);
        }

        .main-tab.pending {
            background: linear-gradient(145deg, #ffa502, #ff7f50);
            color: white;
        }

        .main-tab.approved {
            background: linear-gradient(145deg, #26de81, #20bf6b);
            color: white;
        }

        .main-tab:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .main-tab.active {
            transform: scale(1.02);
            box-shadow: 0 0 0 3px #ffd700;
        }

        .main-tab .badge {
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 10px;
            font-size: 14px;
        }

        .type-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .type-tab {
            flex: 1;
            padding: 15px 20px;
            border-radius: 40px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.3);
        }

        .type-tab.cookies {
            background: linear-gradient(145deg, #ff6b6b, #ff4757);
            color: white;
        }

        .type-tab.twofa {
            background: linear-gradient(145deg, #4834d4, #686de0);
            color: white;
        }

        .type-tab:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .type-tab.active {
            transform: scale(1.02);
            box-shadow: 0 0 0 3px #ffd700;
        }

        .type-stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .type-stat-box {
            flex: 1;
            background: #2d3349;
            border-radius: 30px;
            padding: 15px;
            border: 1px solid rgba(255,215,0,0.2);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .type-stat-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,215,0,0.2);
        }

        .type-stat-box.cookies .stat-value {
            color: #ff6b6b;
            font-size: 28px;
            font-weight: bold;
        }

        .type-stat-box.twofa .stat-value {
            color: #686de0;
            font-size: 28px;
            font-weight: bold;
        }

        .type-stat-box.duplicate .stat-value {
            color: #4CAF50;
            font-size: 28px;
            font-weight: bold;
        }

        .type-stat-box .stat-label {
            color: #fff;
            font-size: 14px;
        }

        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .copy-all-btn {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            min-width: 200px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.4);
        }

        .search-box {
            flex: 2;
            min-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            background: #3a4055;
            border: none;
            border-radius: 40px;
            color: #fff;
            font-size: 16px;
            box-shadow: inset 5px 5px 10px rgba(0,0,0,0.5);
        }

        .settings-section {
            background: #2d3349;
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 10px;
        }

        .settings-header h3 {
            color: #ffd700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-header .arrow {
            color: #ffd700;
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .settings-header.active .arrow {
            transform: rotate(180deg);
        }

        .settings-content {
            display: none;
            padding-top: 20px;
        }

        .settings-content.show {
            display: block;
        }

        .payment-toggles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .toggle-item {
            background: #3a4055;
            padding: 12px 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
        }

        .toggle-item label {
            color: #fff;
            font-size: 14px;
        }

        .toggle-item input[type="checkbox"] {
            width: 44px;
            height: 22px;
            appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 22px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-item input[type="checkbox"]:checked {
            background: #ffd700;
        }

        .toggle-item input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .toggle-item input[type="checkbox"]:checked::before {
            left: 24px;
        }

        .save-settings-btn {
            background: linear-gradient(145deg, #ffd700, #ffa500);
            color: #1a1e2b;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
        }

        .system-control {
            background: rgba(255,215,0,0.05);
            border-radius: 30px;
            padding: 20px;
            margin-top: 20px;
        }

        .system-toggle {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .system-toggle button {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.4);
        }

        .btn-enable {
            background: linear-gradient(145deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-disable {
            background: linear-gradient(145deg, #f44336, #d32f2f);
            color: white;
        }

        .system-message {
            flex: 1;
            min-width: 300px;
        }

        .system-message input {
            width: 100%;
            padding: 12px 20px;
            background: #3a4055;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
        }

        .current-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            margin-left: 10px;
        }

        .status-on {
            background: rgba(76,175,80,0.2);
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }

        .status-off {
            background: rgba(244,67,54,0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .accounting-section {
            margin-top: 20px;
            background: rgba(255,215,0,0.05);
            border-radius: 30px;
            padding: 20px;
        }

        .add-income-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .add-income-form input {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            background: #3a4055;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
        }

        .add-income-form button {
            background: linear-gradient(145deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }

        .date-filter {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 30px;
        }

        .date-filter input {
            padding: 10px 15px;
            background: #3a4055;
            border: none;
            border-radius: 20px;
            color: #fff;
        }

        .date-filter button {
            background: linear-gradient(145deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        .filter-active {
            background: rgba(255,215,0,0.2) !important;
            border: 1px solid #ffd700 !important;
        }

        .income-history {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .income-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            margin-bottom: 8px;
            border-left: 4px solid #ffd700;
        }

        .income-item .date {
            color: #ffd700;
            font-size: 12px;
        }

        .income-item .amount {
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .income-item .note {
            color: #888;
            font-size: 12px;
        }

        .income-actions {
            display: flex;
            gap: 5px;
        }

        .income-actions button {
            width: 30px;
            height: 30px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .edit-income {
            background: #3498db;
            color: white;
        }

        .delete-income {
            background: #f44336;
            color: white;
        }

        .delete-old-btn {
            background: linear-gradient(145deg, #f44336, #d32f2f);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            margin-top: 15px;
        }

        .danger-zone {
            margin-top: 20px;
            padding: 20px;
            background: rgba(244,67,54,0.1);
            border-radius: 30px;
            border: 1px solid #f44336;
        }

        .danger-btn {
            background: linear-gradient(145deg, #f44336, #d32f2f);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
        }

        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .user-card {
            background: #2d3349;
            border-radius: 40px;
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 
                10px 10px 20px rgba(0,0,0,0.4),
                inset 2px 2px 5px rgba(255,255,255,0.1),
                inset -3px -3px 8px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .user-card.deleting {
            opacity: 0.5;
            transform: scale(0.95);
            pointer-events: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
        }

        .phone-number {
            background: linear-gradient(145deg, #ffd700, #ffa500);
            color: #1a1e2b;
            padding: 8px 15px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
        }

        .type-badge {
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
        }

        .type-badge.cookies {
            background: #ff6b6b;
            color: white;
        }

        .type-badge.twofa {
            background: #686de0;
            color: white;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-badge.pending {
            background: #ffa502;
            color: white;
        }

        .status-badge.approved {
            background: #26de81;
            color: white;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            color: #fff;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
        }

        .payment-badge {
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid #ffd700;
        }

        .stats-row-compact {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            margin: 5px 0 8px 0;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
        }

        .stats-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .total-accounts {
            color: #ffd700;
            font-size: 14px;
            font-weight: 600;
        }

        .total-accounts strong {
            font-size: 18px;
            color: #fff;
            background: rgba(255,215,0,0.2);
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 5px;
        }

        .duplicate-badge {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }

        .duplicate-badge strong {
            font-size: 18px;
            background: rgba(76, 175, 80, 0.3);
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 5px;
            color: #fff;
        }

        .rate-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding-top: 5px;
            border-top: 1px solid rgba(255,215,0,0.2);
        }

        .rate-select-small {
            width: 80px;
            background: #3a4055;
            border: 1px solid #ffd700;
            border-radius: 20px;
            padding: 4px 4px;
            color: #ffd700;
            font-weight: bold;
            font-size: 12px;
            outline: none;
            cursor: pointer;
            text-align: center;
        }

        .rate-select-small option {
            background: #2d3349;
            color: #ffd700;
            text-align: center;
        }

        .amount-display {
            background: linear-gradient(145deg, #ffd700, #ffa500);
            color: #1a1e2b;
            padding: 4px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
        }

        .timestamp {
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            margin-top: 5px;
            text-align: right;
        }

        .expiry-info {
            color: #ffa502;
            font-size: 11px;
            margin-top: 2px;
            text-align: right;
        }

        .action-buttons {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .action-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 18px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.4);
        }

        .action-btn.phone-btn {
            background: linear-gradient(145deg, #00b894, #00a884);
            color: white;
            border: 1px solid #00d4a0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .action-btn.phone-btn:hover {
            background: linear-gradient(145deg, #00a884, #009970);
            transform: scale(1.1);
            box-shadow: 0 0 15px #00b894;
        }

        .action-btn.telegram-btn {

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, remove, update, set, get, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHqx6dAHeGFdtvY8682b_iQkdnk2ie0ug",
            authDomain: "saprahik-kaj.firebaseapp.com",
            databaseURL: "https://saprahik-kaj-default-rtdb.firebaseio.com",
            projectId: "saprahik-kaj",
            storageBucket: "saprahik-kaj.firebasestorage.app",
            messagingSenderId: "336661054558",
            appId: "1:336661054558:web:1beb394b660c9d6cf520cf",
            measurementId: "G-VDSE7LQRH9"
        };

        const secondDatabaseConfig = {
            databaseURL: "https://free-lancher-24-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const secondApp = initializeApp(secondDatabaseConfig, 'secondary');
        const secondDB = getDatabase(secondApp);

        let allSecondDBUsernames = new Set();
        let secondDBLoaded = false;

        let allGroups = [];
        let currentType = 'cookies';
        let currentMainTab = 'pending';
        let searchTerm = '';
        let currentFilterDate = null;

        const userRatesRef = ref(db, 'userRates');
        const incomeRef = ref(db, 'income');

        const DEFAULT_RATES = {
            'cookies': 3.50,
            '2fa': 2.00
        };

        function generateRateOptions(type) {
            const options = [];
            if (type === '2fa') {
                for (let rate = 2.00; rate <= 3.00; rate += 0.10) {
                    options.push(rate.toFixed(2));
                }
            } else {
                for (let rate = 3.50; rate <= 4.50; rate += 0.10) {
                    options.push(rate.toFixed(2));
                }
            }
            return options;
        }

        function formatTelegramUsername(username) {
            if (!username || username === 'N/A') return 'unknown';
            return username.replace('@', '').toLowerCase().trim();
        }

        function encodeUsername(username) {
            if (!username) return '';
            let encoded = '';
            for (let i = 0; i < username.length; i++) {
                const char = username[i];
                if (char === '.') encoded += '_x2E_';
                else if (char === '#') encoded += '_x23_';
                else if (char === '$') encoded += '_x24_';
                else if (char === '[') encoded += '_x5B_';
                else if (char === ']') encoded += '_x5D_';
                else if (char === '/') encoded += '_x2F_';
                else if (char === '\\') encoded += '_x5C_';
                else encoded += char;
            }
            return encoded;
        }

        function checkDuplicates(usernames) {
            if (!secondDBLoaded || !usernames || usernames.length === 0) return 0;
            
            let duplicateCount = 0;
            usernames.forEach(username => {
                const encoded = encodeUsername(username);
                if (allSecondDBUsernames.has(encoded)) {
                    duplicateCount++;
                }
            });
            return duplicateCount;
        }

        async function loadSecondDatabase() {
            try {
                console.log('দ্বিতীয় ডাটাবেস লোড হচ্ছে...');
                const reportsRef = ref(secondDB, 'reports');
                const snapshot = await get(reportsRef);
                
                if (snapshot.exists()) {
                    const reports = snapshot.val();
                    allSecondDBUsernames.clear();
                    
                    Object.keys(reports).forEach(date => {
                        const dateData = reports[date];
                        if (dateData.users) {
                            Object.keys(dateData.users).forEach(type => {
                                const typeUsers = dateData.users[type];
                                Object.keys(typeUsers).forEach(encodedUsername => {
                                    allSecondDBUsernames.add(encodedUsername);
                                });
                            });
                        }
                    });
                    
                    secondDBLoaded = true;
                    console.log(`✅ দ্বিতীয় ডাটাবেস থেকে ${allSecondDBUsernames.size} টি ইউজারনেম লোড হয়েছে`);
                }
            } catch (error) {
                console.error('দ্বিতীয় ডাটাবেস লোড করতে সমস্যা:', error);
            }
        }

        function getUserRate(userRates, telegram, type) {
            if (!telegram || telegram === 'unknown') return DEFAULT_RATES[type];
            
            const formattedTelegram = formatTelegramUsername(telegram);
            
            if (userRates && userRates[formattedTelegram] && userRates[formattedTelegram][type] !== undefined) {
                return userRates[formattedTelegram][type];
            }
            
            return DEFAULT_RATES[type];
        }

        window.saveUserRate = function(telegram, value, type) {
            const formattedTelegram = formatTelegramUsername(telegram);
            if (formattedTelegram === 'unknown') {
                showToast('টেলিগ্রাম ইউজারনেম নেই', 'error');
                return;
            }
            
            const updates = {};
            updates[`userRates/${formattedTelegram}/${type}`] = parseFloat(value);
            
            update(ref(db), updates)
                .then(() => {
                    showToast(`@${formattedTelegram} (${type}) এর রেট ${value} টাকা সেট হয়েছে`, 'success');
                })
                .catch(() => showToast('রেট সেভ করতে সমস্যা', 'error'));
        };

        window.toggleSettings = function(type) {
            const content = document.getElementById(type + 'Settings');
            const arrow = document.getElementById(type + 'Arrow');
            content.classList.toggle('show');
            arrow.style.transform = content.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0)';
        };

        window.switchMainTab = function(tab) {
            currentMainTab = tab;
            document.getElementById('tabPending').classList.remove('active');
            document.getElementById('tabApproved').classList.remove('active');
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            document.getElementById('duplicateLabel').innerText = tab === 'pending' ? '✅ পেন্ডিং ওকে আইডি' : '✅ অ্যাপ্রুভড ওকে আইডি';
            filterData();
        };

        window.switchType = function(type) {
            currentType = type;
            document.getElementById('tabCookies').classList.remove('active');
            document.getElementById('tab2fa').classList.remove('active');
            document.getElementById('tab' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
            filterData();
        };

        const systemRef = ref(db, 'settings/system');
        onValue(systemRef, (snapshot) => {
            const data = snapshot.val() || { enabled: true, message: '' };
            document.getElementById('systemStatus').textContent = data.enabled ? 'চালু' : 'বন্ধ';
            document.getElementById('systemStatus').className = `current-status ${data.enabled ? 'status-on' : 'status-off'}`;
            document.getElementById('maintenanceMessage').value = data.message || '';
        });

        const settingsRef = ref(db, 'settings/paymentMethods');
        onValue(settingsRef, (snapshot) => {
            const settings = snapshot.val() || {};
            document.getElementById('toggleBkash').checked = settings.bkash !== false;
            document.getElementById('toggleNagad').checked = settings.nagad !== false;
            document.getElementById('toggleBkashNagad').checked = settings.bkashNagad !== false;
            document.getElementById('toggleRocket').checked = settings.rocket !== false;
            document.getElementById('toggleMobileRecharge').checked = settings.mobileRecharge !== false;
            document.getElementById('toggleBinance').checked = settings.binance !== false;
            document.getElementById('toggleInbox').checked = settings.inbox !== false;
        });

        window.savePaymentSettings = function() {
            const settings = {
                bkash: document.getElementById('toggleBkash').checked,
                nagad: document.getElementById('toggleNagad').checked,
                bkashNagad: document.getElementById('toggleBkashNagad').checked,
                rocket: document.getElementById('toggleRocket').checked,
                mobileRecharge: document.getElementById('toggleMobileRecharge').checked,
                binance: document.getElementById('toggleBinance').checked,
                inbox: document.getElementById('toggleInbox').checked
            };
            set(settingsRef, settings).then(() => showToast('পেমেন্ট সেটিংস সেভ হয়েছে', 'success')).catch(() => showToast('সেভ করতে সমস্যা', 'error'));
        };

        window.toggleSystem = function(enabled) {
            const message = document.getElementById('maintenanceMessage').value;
            set(systemRef, { enabled, message }).then(() => showToast(`সিস্টেম ${enabled ? 'চালু' : 'বন্ধ'} করা হয়েছে`, 'success'));
        };
        
        window.updateSystemStatus = function() {
            const message = document.getElementById('maintenanceMessage').value;
            set(systemRef, { enabled: true, message }).then(() => showToast('সিস্টেম স্ট্যাটাস আপডেট হয়েছে', 'success'));
        };

        window.fullPageRefresh = function() {
            showToast('পৃষ্ঠা রিফ্রেশ হচ্ছে... 🔄', 'warning');
            setTimeout(() => {
                window.location.reload();
            }, 500);
        };

        window.softRefresh = function() {
            showToast('ডাটা রিফ্রেশ হচ্ছে... 🔄', 'warning');
            
            loadSecondDatabase().then(() => {
                filterData();
                showToast('ডাটা রিফ্রেশ সম্পন্ন ✅', 'success');
            });
        };

        function loadData() {
            const submitsRef = ref(db, 'submits');
            
            onValue(submitsRef, async (snapshot) => {
                const data = snapshot.val();
                
                const ratesSnapshot = await get(userRatesRef);
                const userRates = ratesSnapshot.val() || {};
                
                let totalPendingCookies = 0, totalPending2fa = 0, totalApprovedCookies = 0, totalApproved2fa = 0;
                let totalPendingMoneyCalc = 0;
                let totalApprovedMoneyCalc = 0;
                
                let oldestPendingTimestamp = Infinity;
                let oldestApprovedTimestamp = Infinity;
                
                const groupsMap = new Map();

                if (data) {
                    Object.keys(data).forEach(key => {
                        const item = { id: key, ...data[key] };
                        const type = item.type || 'cookies';
                        const status = item.status || 'pending';
                        const telegram = item.telegram || 'N/A';

                        if (type === 'cookies') {
                            if (status === 'pending') totalPendingCookies++;
                            else totalApprovedCookies++;
                        } else {
                            if (status === 'pending') totalPending2fa++;
                            else totalApproved2fa++;
                        }

                        const groupKey = `${telegram}_${type}_${status}`;

                        if (!groupsMap.has(groupKey)) {
                            groupsMap.set(groupKey, {
                                id: groupKey.replace(/[^a-zA-Z0-9]/g, '_') + '_' + key.substring(0,5),
                                telegram: telegram,
                                number: item.number || 'unknown',
                                paymentMethod: item.paymentMethod,
                                timestamp: item.timestamp,
                                status: status,
                                approvedAt: item.approvedAt || item.timestamp,
                                type: type,
                                accounts: [],
                                ids: [],
                                duplicateCount: 0
                            });
                        }
                        const group = groupsMap.get(groupKey);
                        if (item.username) {
                            group.accounts.push(item.username);
                        }
                        group.ids.push(key);
                    });

                    allGroups = Array.from(groupsMap.values());

                    allGroups.forEach(group => {
                        group.duplicateCount = checkDuplicates(group.accounts);
                        
                        const rate = getUserRate(userRates, group.telegram, group.type);
                        const amount = (group.duplicateCount || 0) * rate;
                        
                        if (group.status === 'pending') {
                            totalPendingMoneyCalc += amount;
                            
                            if (group.timestamp && group.timestamp < oldestPendingTimestamp) {
                                oldestPendingTimestamp = group.timestamp;
                            }
                        } else {
                            totalApprovedMoneyCalc += amount;
                            
                            if (group.timestamp && group.timestamp < oldestApprovedTimestamp) {
                                oldestApprovedTimestamp = group.timestamp;
                            }
                        }
                    });

                } else {
                    allGroups = [];
                }

                const now = Date.now();
                const oneDay = 24 * 60 * 60 * 1000;
                
                let pendingDays = 0;
                let approvedDays = 0;
                
                if (oldestPendingTimestamp !== Infinity) {
                    pendingDays = Math.ceil((now - oldestPendingTimestamp) / oneDay);
                }
                
                if (oldestApprovedTimestamp !== Infinity) {
                    approvedDays = Math.ceil((now - oldestApprovedTimestamp) / oneDay);
                }

                document.getElementById('pendingCount').textContent = totalPendingCookies + totalPending2fa;
                document.getElementById('approvedCount').textContent = totalApprovedCookies + totalApproved2fa;
                
                document.getElementById('totalPendingMoney').textContent = totalPendingMoneyCalc.toFixed(2);
                document.getElementById('totalApprovedMoney').textContent = totalApprovedMoneyCalc.toFixed(2);
                
                document.getElementById('pendingDays').textContent = pendingDays;
                document.getElementById('approvedDays').textContent = approvedDays;
                
                updateCountersByCurrentView(totalPendingCookies, totalPending2fa, totalApprovedCookies, totalApproved2fa);
                
                filterData();
                updateProfitAndReceived();
                
            }, (error) => {
                console.error('ডাটা লোড করতে সমস্যা:', error);
                showToast('ডাটা লোড করতে সমস্যা!', 'error');
            });
        }

        function updateCountersByCurrentView(pendingCookies, pending2fa, approvedCookies, approved2fa) {
            if (currentMainTab === 'pending') {
                document.getElementById('cookiesCount').textContent = pendingCookies;
                document.getElementById('twofaCount').textContent = pending2fa;
            } else {
                document.getElementById('cookiesCount').textContent = approvedCookies;
                document.getElementById('twofaCount').textContent = approved2fa;
            }
        }

        window.addOrUpdateIncome = function() {
            const amount = parseFloat(document.getElementById('incomeAmount').value);
            const note = document.getElementById('incomeNote').value;
            let date = document.getElementById('incomeDate').value;
            const editingId = document.getElementById('editingIncomeId').value;
            
            if (!amount || amount <= 0) {
                showToast('সঠিক টাকা ইনপুট করুন', 'error');
                return;
            }
            
            if (!date) {
                date = new Date().toISOString().split('T')[0];
            }
            
            const timestamp = new Date(date).setHours(0,0,0,0);
            
            const incomeData = {
                amount: amount,
                note: note || 'নতুন ইনকাম',
                date: date,
                timestamp: timestamp,
                updatedAt: Date.now()
            };
            
            if (editingId) {
                set(ref(db, `income/${editingId}`), incomeData)
                    .then(() => {
                        showToast('ইনকাম আপডেট হয়েছে', 'success');
                        resetIncomeForm();
                    })
                    .catch(() => showToast('আপডেট করতে সমস্যা', 'error'));
            } else {
                push(incomeRef, incomeData)
                    .then(() => {
                        showToast('ইনকাম যোগ হয়েছে', 'success');
                        resetIncomeForm();
                    })
                    .catch(() => showToast('ইনকাম যোগ করতে সমস্যা', 'error'));
            }
        };

        window.editIncome = function(id, amount, note, date) {
            document.getElementById('incomeAmount').value = amount;
            document.getElementById('incomeNote').value = note || '';
            document.getElementById('incomeDate').value = date;
            document.getElementById('editingIncomeId').value = id;
            document.getElementById('incomeBtn').innerHTML = '<i class="fas fa-edit"></i> আপডেট';
        };

        window.deleteIncome = function(id) {
            if (!confirm('এই ইনকাম এন্ট্রি ডিলিট করবেন?')) return;
            
            remove(ref(db, `income/${id}`))
                .then(() => showToast('ইনকাম ডিলিট হয়েছে', 'success'))
                .catch(() => showToast('ডিলিট করতে সমস্যা', 'error'));
        };

        function resetIncomeForm() {
            document.getElementById('incomeAmount').value = '';
            document.getElementById('incomeNote').value = '';
            document.getElementById('incomeDate').value = '';
            document.getElementById('editingIncomeId').value = '';
            document.getElementById('incomeBtn').innerHTML = '<i class="fas fa-plus-circle"></i> ইনকাম অ্যাড';
        }

        window.applyDateFilter = function() {
            const filterDate = document.getElementById('filterDate').value;
            if (!filterDate) {
                showToast('একটি তারিখ সিলেক্ট করুন', 'warning');
                return;
            }
            
            currentFilterDate = filterDate;
            
            document.getElementById('filterIndicator').style.display = 'flex';
            document.getElementById('filterDateText').textContent = new Date(filterDate).toLocaleDateString('bn-BD');
            
            filterData();
            updateProfitAndReceived();
        };

        window.clearFilter = function() {
            currentFilterDate = null;
            document.getElementById('filterIndicator').style.display = 'none';
            document.getElementById('filterDate').value = '';
            
            filterData();
            updateProfitAndReceived();
        };

        function isDateInRange(timestamp) {
            if (!currentFilterDate) return true;
            
            const filterTime = new Date(currentFilterDate).setHours(0,0,0,0);
            const itemTime = new Date(timestamp).setHours(0,0,0,0);
            
            return itemTime === filterTime;
        }

        function updateProfitAndReceived() {
            const incomeRef = ref(db, 'income');
            get(incomeRef).then((snapshot) => {
                const incomeData = snapshot.val() || {};
                let totalReceived = 0;
                const incomeList = [];
                
                Object.keys(incomeData).forEach(key => {
                    const item = incomeData[key];
                    
                    if (!currentFilterDate || isDateInRange(item.timestamp || new Date(item.date).getTime())) {
                        totalReceived += item.amount || 0;
                    }
                    
                    incomeList.push({ id: key, ...item });
                });
                
                let approvedMoney = 0;
                if (currentFilterDate) {
                    const filteredGroups = allGroups.filter(group => 
                        group.type === currentType && 
                        group.status === 'approved' &&
                        isDateInRange(group.approvedAt || group.timestamp)
                    );
                    
                    filteredGroups.forEach(group => {
                        const rate = getUserRate({}, group.telegram, group.type);
                        approvedMoney += (group.duplicateCount || 0) * rate;
                    });
                } else {
                    approvedMoney = parseFloat(document.getElementById('totalApprovedMoney').textContent) || 0;
                }
                
                const profit = totalReceived - approvedMoney;
                
                document.getElementById('totalReceivedAmount').textContent = totalReceived.toFixed(2);
                document.getElementById('totalProfitAmount').textContent = profit.toFixed(2);
                
                displayIncomeHistory(incomeList);
            }).catch(error => {
                console.error('ইনকাম লোড করতে সমস্যা:', error);
            });
        }

        function displayIncomeHistory(incomeList) {
            const container = document.getElementById('incomeHistory');
            
            incomeList.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            
            if (incomeList.length === 0) {
                container.innerHTML = '<div class="empty-state" style="padding: 20px;">কোন ইনকাম রেকর্ড নেই</div>';
                return;
            }
            
            let html = '';
            incomeList.forEach(item => {
                const dateStr = item.date || new Date(item.timestamp).toLocaleDateString('bn-BD');
                html += `
                    <div class="income-item">
                        <div>
                            <div class="amount">+ ${item.amount.toFixed(2)} টাকা</div>
                            <div class="note">${item.note || 'ইনকাম'}</div>
                            <div class="date">${dateStr}</div>
                        </div>
                        <div class="income-actions">
                            <button class="edit-income" onclick='editIncome("${item.id}", ${item.amount}, "${item.note || ''}", "${item.date}")' title="এডিট"><i class="fas fa-edit"></i></button>
                            <button class="delete-income" onclick='deleteIncome("${item.id}")' title="ডিলিট"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        window.deleteOldDataManually = async function() {
            if (!confirm('⚠️ আজকে থেকে ৩০ দিনের আগের সব ডাটা ডিলিট হবে? (submits + ইনকাম)')) return;
            if (!confirm('আপনি কি নিশ্চিত? এই কাজ অপরিবর্তনীয়!')) return;
            
            showToast('ডাটা ডিলিট প্রক্রিয়া শুরু হয়েছে...', 'warning');
            
            const thirtyDaysAgo = Date.now() - (30 * 24 * 60 * 60 * 1000);
            
            try {
                const submitsSnapshot = await get(ref(db, 'submits'));
                if (submitsSnapshot.exists()) {
                    const submitsData = submitsSnapshot.val();
                    const updates = {};
                    let deleteCount = 0;
                    
                    Object.keys(submitsData).forEach(key => {
                        const item = submitsData[key];
                        const itemTime = item.approvedAt || item.timestamp;
                        if (itemTime && itemTime < thirtyDaysAgo) {
                            updates[`submits/${key}`] = null;
                            deleteCount++;
                        }
                    });
                    
                    if (deleteCount > 0) {
                        await update(ref(db), updates);
                        showToast(`${deleteCount} টি পুরনো submits ডাটা ডিলিট হয়েছে`, 'success');
                    }
                }
                
                const incomeSnapshot = await get(ref(db, 'income'));
                if (incomeSnapshot.exists()) {
                    const incomeData = incomeSnapshot.val();
                    const updates = {};
                    let deleteCount = 0;
                    
                    Object.keys(incomeData).forEach(key => {
                        const item = incomeData[key];
                        const itemTime = item.timestamp || new Date(item.date).getTime();
                        if (itemTime < thirtyDaysAgo) {
                            updates[`income/${key}`] = null;
                            deleteCount++;
                        }
                    });
                    
                    if (deleteCount > 0) {
                        await update(ref(db), updates);
                        showToast(`${deleteCount} টি পুরনো ইনকাম ডাটা ডিলিট হয়েছে`, 'success');
                    }
                }
                
                showToast('পুরনো ডাটা ডিলিট সম্পন্ন ✅', 'success');
                clearFilter();
                
            } catch (error) {
                console.error('ডাটা ডিলিট করতে সমস্যা:', error);
                showToast('ডাটা ডিলিট করতে সমস্যা', 'error');
            }
        };

        window.filterData = function() {
            searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allGroups.filter(group => group.type === currentType && group.status === currentMainTab);
            
            if (currentFilterDate) {
                filtered = filtered.filter(group => {
                    const groupTime = group.approvedAt || group.timestamp;
                    return isDateInRange(groupTime);
                });
            }
            
            if (searchTerm) {
                filtered = filtered.filter(group =>
                    group.telegram?.toLowerCase().includes(searchTerm) ||
                    group.number?.toLowerCase().includes(searchTerm)
                );
            }
            
            displayGroups(filtered);
            
            updateProfitAndReceived();
        };

        window.approveUser = function(idsStr) {
            if (!confirm('আপনি কি এই গ্রুপের সব একাউন্ট অ্যাপ্রুভ করতে চান?')) return;
            
            const ids = idsStr.split(',');
            const approvedAt = Date.now();
            
            const updates = {};
            ids.forEach(id => {
                updates[`submits/${id}/status`] = 'approved';
                updates[`submits/${id}/approvedAt`] = approvedAt;
            });
            
            update(ref(db), updates)
                .then(() => {
                    showToast(`✅ ${ids.length} টি গ্রুপ অ্যাপ্রুভ করা হয়েছে`, 'success');
                    filterData();
                })
                .catch(() => showToast('অ্যাপ্রুভ করতে সমস্যা', 'error'));
        };

        async function displayGroups(groups) {
            const container = document.getElementById('usersGrid');
            if (groups.length === 0) {
                container.innerHTML = `<div class="empty-state">📭 কোন ${currentMainTab === 'pending' ? 'পেন্ডিং' : 'অ্যাপ্রুভড'} ${currentType === 'cookies' ? 'কুকিজ' : '2FA'} একাউন্ট নেই</div>`;
                return;
            }

            groups.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            const rateSnapshot = await get(userRatesRef);
            const userRates = rateSnapshot.val() || {};
            
            let groupsHtml = '';
            let totalAccountsCount = 0;
            let totalDuplicatesCount = 0;
            
            groups.forEach(group => {
                totalAccountsCount += group.accounts.length;
                totalDuplicatesCount += group.duplicateCount || 0;
                
                const date = new Date(group.timestamp || Date.now());
                const timeString = date.toLocaleString('bn-BD');
                
                const cleanTelegram = formatTelegramUsername(group.telegram);
                const telegramLink = `https://t.me/${cleanTelegram}`;
                
                const rate = getUserRate(userRates, group.telegram, group.type);
                const savedRate = rate.toFixed(2);
                
                const totalAmount = (group.duplicateCount || 0) * rate;

                let expiryInfo = '';
                if (group.status === 'approved' && group.approvedAt) {
                    const daysPassed = Math.floor((Date.now() - group.approvedAt) / (24 * 60 * 60 * 1000));
                    const daysLeft = 15 - daysPassed;
                    if (daysLeft > 0) expiryInfo = `<div class="expiry-info">⏳ আরো ${daysLeft} দিন বাকি</div>`;
                }

                groupsHtml += `
                    <div class="user-card" id="card-${group.id}">
                        <div class="card-header">
                            <span class="phone-number">📞 ${group.number}</span>
                            <div style="display: flex; gap: 5px;">
                                <span class="type-badge ${group.type === 'cookies' ? 'cookies' : 'twofa'}">${group.type === 'cookies' ? '🍪 কুকিজ' : '🔐 2FA'}</span>
                                <span class="status-badge ${group.status}">${group.status === 'pending' ? '⏳ পেন্ডিং' : '✅ অ্যাপ্রুভড'}</span>
                            </div>
                        </div>
                        <div class="info-row"><span>📱</span><span>@${group.telegram}</span></div>
                        <div class="info-row"><span>💰</span><span class="payment-badge">${group.paymentMethod || 'N/A'}</span></div>
                        <div class="stats-row-compact">
                            <div class="stats-top">
                                <div class="total-accounts">📊 মোট একাউন্ট: <strong>${group.accounts.length}</strong></div>
                                ${group.duplicateCount > 0 ? `<div class="duplicate-badge">✅ Okay ID: <strong>${group.duplicateCount}</strong></div>` : ''}
                            </div>
                            <div class="rate-section">
                                <select class="rate-select-small" onchange="saveUserRate('${group.telegram}', this.value, '${group.type}')">
                                    ${generateRateOptions(group.type).map(rate => `<option value="${rate}" ${rate === savedRate ? 'selected' : ''}>${rate}</option>`).join('')}
                                </select>
                                <span class="amount-display" id="amount-${group.id}">${totalAmount.toFixed(2)} টাকা</span>
                            </div>
                        </div>
                        <div class="timestamp">⏰ ${timeString}</div>
                        ${expiryInfo}
                        <div class="action-buttons">
                            <button class="copy-usernames-btn" onclick='copyUsernames(${JSON.stringify(group.accounts)})'><i class="fas fa-copy" style="margin-right: 5px;"></i>সব কপি (${group.accounts.length})</button>
                            <button class="action-btn phone-btn" onclick="copyText('${group.number}')" title="কপি নাম্বার"><i class="fas fa-phone-alt"></i></button>
                            <a href="${telegramLink}" target="_blank" class="action-btn telegram-btn" title="টেলিগ্রাম"><i class="fab fa-telegram-plane"></i></a>
                            ${group.status === 'pending' ? `<button class="approve-btn" onclick="approveUser('${group.ids.join(',')}')"><i class="fas fa-check-circle" style="margin-right: 5px;"></i>অ্যাপ্রুভ</button>` : ''}
                            <button class="action-btn delete-btn" onclick="deleteGroup('${group.ids.join(',')}', '${group.id}')" title="ডিলিট"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = groupsHtml;

            document.getElementById('totalUsers').textContent = groups.length;
            document.getElementById('totalAccounts').textContent = totalAccountsCount;
            document.getElementById('totalDuplicates').textContent = totalDuplicatesCount;
        }

        window.copyUsernames = function(usernames) {
            if (!usernames?.length) return showToast('❌ কপি করার মতো একাউন্ট নেই', 'error');
            const text = usernames.join('\n');
            navigator.clipboard.writeText(text).then(() => showToast(`✅ ${usernames.length} টি একাউন্ট কপি হয়েছে`, 'success')).catch(() => {
                const textarea = document.createElement('textarea'); textarea.value = text; document.body.appendChild(textarea); textarea.select(); document.execCommand('copy'); document.body.removeChild(textarea); showToast(`✅ ${usernames.length} টি একাউন্ট কপি হয়েছে`, 'success');
            });
        };
        
        window.copyText = function(text) {
            if (!text) return showToast('❌ কপি করার মতো টেক্সট নেই', 'error');
            navigator.clipboard.writeText(text).then(() => showToast('✅ কপি হয়েছে!', 'success')).catch(() => {
                const textarea = document.createElement('textarea'); textarea.value = text; document.body.appendChild(textarea); textarea.select(); document.execCommand('copy'); document.body.removeChild(textarea); showToast('✅ কপি হয়েছে!', 'success');
            });
        };
        
        window.copyAllUsernames = function() {
            const filtered = allGroups.filter(g => g.type === currentType && g.status === currentMainTab);
            const allUsernames = filtered.flatMap(g => g.accounts);
            if (!allUsernames.length) return showToast('❌ কপি করার মতো একাউন্ট নেই', 'error');
            copyUsernames(allUsernames);
        };

        window.deleteGroup = function(idsStr, groupId) {
            if (!confirm('আপনি কি এই গ্রুপের সব একাউন্ট ডিলিট করতে চান?')) return;
            
            const card = document.getElementById(`card-${groupId}`);
            if (card) card.classList.add('deleting');
            
            const ids = idsStr.split(',');
            
            const updates = {};
            ids.forEach(id => {
                updates[`submits/${id}`] = null;
            });
            
            update(ref(db), updates)
                .then(() => {
                    showToast('গ্রুপ ডিলিট করা হয়েছে', 'success');
                    filterData();
                })
                .catch((error) => { 
                    console.error('Delete error:', error); 
                    showToast('ডিলিট করতে সমস্যা', 'error'); 
                    if (card) card.classList.remove('deleting'); 
                });
        };

        window.clearAllDatabase = function() {
            if (confirm('⚠️ আপনি কি সম্পূর্ণ ডাটাবেজ ডিলিট করতে চান?') && confirm('আপনি কি নিশ্চিত? এই কাজ অপরিবর্তনীয়!')) {
                remove(ref(db, 'submits')).then(() => {
                    showToast('সমস্ত ডাটা ডিলিট করা হয়েছে', 'success');
                }).catch(() => showToast('ডিলিট করতে সমস্যা', 'error'));
            }
        };

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type} show`;
            toast.textContent = message;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        loadSecondDatabase().then(() => {
            loadData();
            updateProfitAndReceived();
        });
    </script>
</body>
</html>
