<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EBH TEAM | পেমেন্ট সিস্টেম</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0f1e;
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding-top: 10px;
        }

        .main-card {
            background: rgba(20, 25, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 22px 18px;
            border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .gold-logo {
            font-size: 32px;
            font-weight: 900;
            font-family: 'Orbitron', 'Rajdhani', sans-serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700, 2px 2px 0 #000;
        }
        
        .logo-badge {
            display: inline-block;
            background: linear-gradient(145deg, #ffd700, #ffa500);
            color: #000;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
        }

        .maintenance-notice {
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #f44336;
            color: #ffcdd2;
            padding: 16px 20px;
            border-radius: 40px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 20px;
            display: none;
        }
        
        .maintenance-notice.show {
            display: block;
        }

        .type-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .type-btn {
            flex: 1;
            padding: 16px 8px;
            border-radius: 40px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            border: none;
            background: #2d3349;
            color: white;
            box-shadow: 0 8px 0 #1a1e2b;
            cursor: pointer;
            transition: 0.1s;
        }
        
        .type-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #1a1e2b;
        }
        
        .type-btn.cookies.active {
            background: #ff4757;
        }
        
        .type-btn.twofa.active {
            background: #4834d4;
        }
        
        .type-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 8px 0 #1a1e2b;
        }

        .username-container {
            position: relative;
            margin-bottom: 18px;
        }
        
        .username-label {
            display: block;
            color: #ffd700;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .username-input {
            width: 100%;
            padding: 16px 20px;
            background: #1e2335;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 40px;
            font-size: 15px;
            color: white;
            resize: vertical;
            min-height: 100px;
            padding-right: 70px;
        }
        
        .username-input:focus {
            outline: none;
            border-color: #ffd700;
        }
        
        .username-counter {
            position: absolute;
            right: 15px;
            bottom: 14px;
            background: rgba(255,215,0,0.2);
            color: #ffd700;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #ffd700;
            pointer-events: none;
        }

        .input-group {
            margin-bottom: 18px;
        }
        
        .input-label {
            display: block;
            color: #ffd700;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
        }
        
        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: #1e2335;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 40px;
            font-size: 15px;
            color: white;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #ffd700;
        }

        /* পেমেন্ট ড্রপডাউন */
        .payment-selector {
            position: relative;
            margin-bottom: 18px;
        }
        
        .payment-selected {
            width: 100%;
            padding: 16px 20px;
            background: #1e2335;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            cursor: pointer;
        }
        
        .payment-selected.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .payment-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e2335;
            border-radius: 25px;
            margin-top: 5px;
            overflow: hidden;
            z-index: 100;
            display: none;
            border: 2px solid #ffd700;
            max-height: none;
        }
        
        .payment-dropdown.show {
            display: block;
        }
        
        .payment-option {
            padding: 14px 18px;
            color: white;
            border-bottom: 1px solid #333;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        
        .payment-option:last-child {
            border-bottom: none;
        }
        
        .payment-option:hover, .payment-option:active {
            background: #ffd700;
            color: #000;
        }
        
        .payment-option.disabled-option {
            opacity: 0.4;
            pointer-events: none;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(145deg, #ffd700, #ffa500);
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            color: #000;
            box-shadow: 0 12px 0 #b27d00;
            cursor: pointer;
            transition: 0.1s;
            margin: 8px 0 16px 0;
        }
        
        .submit-btn:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #b27d00;
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 8px 0 #b27d00;
            cursor: not-allowed;
        }

        .progress-bar {
            height: 8px;
            background: #333;
            border-radius: 8px;
            overflow: hidden;
            margin: 15px 0;
            display: none;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffa500);
            width: 0%;
            transition: width 0.3s;
        }

        .result-box {
            background: rgba(255,215,0,0.1);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #ffd700;
            display: none;
        }
        
        .result-box.show {
            display: block;
        }
        
        .success-text {
            color: #4CAF50;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .duplicate-text {
            color: #ffd700;
        }

        .receipt-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(145deg, #00b894, #00a884);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 8px 0 #006b54;
            transition: 0.1s;
        }
        
        .receipt-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #006b54;
        }
        
        .receipt-details {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 15px;
            margin: 10px 0;
            font-size: 14px;
            color: #fff;
            line-height: 2;
            border: 1px solid rgba(255,215,0,0.2);
        }
        
        .receipt-details div {
            display: flex;
            border-bottom: 1px dashed rgba(255,215,0,0.2);
            padding: 5px 0;
        }
        
        .receipt-details span.label {
            color: #ffd700;
            font-weight: bold;
            width: 100px;
        }
        
        .receipt-details span.value {
            color: #fff;
            flex: 1;
        }

        .rules-card {
            background: rgba(20, 25, 40, 0.95);
            border-radius: 24px;
            padding: 16px;
            margin-top: 10px;
        }
        
        .rules-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        
        .rule-item {
            background: rgba(255,255,255,0.03);
            padding: 10px 12px;
            border-radius: 16px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #fff;
        }
        
        .rule-icon {
            width: 22px;
            height: 22px;
            background: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 12px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            left: 20px;
            background: #1e2335;
            color: white;
            padding: 14px 18px;
            border-radius: 30px;
            transform: translateY(-150%);
            transition: 0.3s;
            z-index: 9999;
            border-left: 6px solid;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            font-size: 14px;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .toast.show {
            transform: translateY(0);
        }
        
        .toast.success { border-left-color: #4CAF50; }
        .toast.error { border-left-color: #f44336; }
        .toast.warning { border-left-color: #ffd700; }
        
        .telegram-notify {
            font-size: 12px;
            color: #4CAF50;
            margin-top: 5px;
            text-align: center;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <div class="logo-area">
                <div class="gold-logo">EBH TEAM</div>
                <div class="logo-badge">✦ Earning By Habib ✦</div>
            </div>

            <div id="maintenanceNotice" class="maintenance-notice">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="maintenanceMessageText">সিস্টেম বন্ধ আছে</span>
            </div>

            <div class="type-row">
                <button class="type-btn cookies" onclick="selectType('cookies')" id="typeCookies">🍪 কুকিজ</button>
                <button class="type-btn twofa" onclick="selectType('2fa')" id="type2fa">🔐 2FA</button>
            </div>

            <div class="username-container">
                <label class="username-label">📝 ইউজারনেম (প্রতি লাইনে একটি)</label>
                <textarea class="username-input" id="usernames" placeholder="username1&#10;username2" oninput="countAccounts()" rows="4"></textarea>
                <div class="username-counter" id="accountCount">০</div>
            </div>

            <div class="input-group">
                <label class="input-label">📱 টেলিগ্রাম ইউজারনেম</label>
                <input class="input-field" type="text" id="telegram" placeholder="@username" value="@">
            </div>

            <!-- পেমেন্ট ড্রপডাউন -->
            <div class="input-group">
                <label class="input-label">💰 পেমেন্ট মেথড</label>
                <div class="payment-selector">
                    <div class="payment-selected" id="paymentSelected" onclick="togglePaymentDropdown()">
                        <span id="selectedPaymentText">সিলেক্ট করুন</span>
                        <span>▼</span>
                    </div>
                    <div class="payment-dropdown" id="paymentDropdown"></div>
                </div>
            </div>

            <div class="input-group" id="numberGroup">
                <label class="input-label">📞 পেমেন্ট নম্বর</label>
                <input class="input-field" type="text" id="number" placeholder="017xxxxxxxx">
            </div>

            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <button class="submit-btn" onclick="submitData()" id="submitBtn">
                <i class="fas fa-paper-plane" style="margin-right: 8px;"></i>
                সাবমিট করুন
            </button>

            <div class="result-box" id="resultBox">
                <div id="resultMessage"></div>
                <div class="receipt-details" id="receiptDetails"></div>
                <div id="telegramNotifyStatus" class="telegram-notify"></div>
                <button class="receipt-btn" onclick="downloadPNG()" id="receiptBtn">
                    <i class="fas fa-image"></i>
                    PNG রিসিট ডাউনলোড করুন
                </button>
            </div>
        </div>

        <div class="rules-card">
            <div class="rules-title"><i class="fas fa-shield-alt"></i> নিয়মাবলী</div>
            <div class="rule-item"><div class="rule-icon">১</div>১০০ টাকার নিচে = মোবাইল রিচার্জ/বাইনান্স</div>
            <div class="rule-item"><div class="rule-icon">২</div>১০০ টাকার উপরে = বিকাশ/নগদ/রকেট</div>
            <div class="rule-item"><div class="rule-icon">৩</div>ডুপ্লিকেট অটো বাদ যাবে</div>
            <div class="rule-item"><div class="rule-icon">৪</div>টাকা পরে নিলে নাম্বার লাগবে না</div>
        </div>
    </div>

    <div style="position: absolute; left: -9999px; top: -9999px;">
        <div id="receiptCanvas" style="width: 600px; background: #0a0f1e; padding: 30px; border-radius: 20px; border: 2px solid #ffd700;"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, push, get, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // Firebase কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyCHqx6dAHeGFdtvY8682b_iQkdnk2ie0ug",
            authDomain: "saprahik-kaj.firebaseapp.com",
            databaseURL: "https://saprahik-kaj-default-rtdb.firebaseio.com",
            projectId: "saprahik-kaj",
            storageBucket: "saprahik-kaj.firebasestorage.app",
            messagingSenderId: "336661054558",
            appId: "1:336661054558:web:1beb394b660c9d6cf520cf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Telegram Bot Token
        const TELEGRAM_BOT_TOKEN = '8250221796:AAHdKid6RAoIeEnjHhrYdHNGkmc38wfs5d4';

        // স্টেট ভেরিয়েবল
        let selectedType = '';
        let selectedPayment = '';
        let selectedPaymentId = '';
        let systemEnabled = true;
        let maintenanceMessage = '';
        let lastSubmission = null;

        // ========== টেলিগ্রাম ইউজার রেজিস্ট্রেশন চেক এবং Chat ID পাওয়া ==========
        async function getUserChatId(telegramUsername) {
            if (!telegramUsername || telegramUsername === '@' || telegramUsername === '') {
                return null;
            }
            
            const cleanUsername = telegramUsername.replace('@', '').toLowerCase().trim();
            if (cleanUsername === '') return null;
            
            try {
                const userRef = ref(db, `telegramUsers/${cleanUsername}/chatId`);
                const snapshot = await get(userRef);
                
                if (snapshot.exists()) {
                    return snapshot.val();
                }
                return null;
            } catch (error) {
                console.error('Chat ID পাওয়ার সময় সমস্যা:', error);
                return null;
            }
        }

        // ========== টেলিগ্রাম মেসেজ পাঠানোর ফাংশন ==========
        async function sendTelegramMessage(chatId, message) {
            if (!chatId) return false;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                
                const result = await response.json();
                return result.ok;
            } catch (error) {
                console.error('টেলিগ্রাম মেসেজ পাঠাতে সমস্যা:', error);
                return false;
            }
        }

        // ========== কনফার্মেশন মেসেজ তৈরি ==========
        function createConfirmationMessage(typeName, uniqueCount, duplicateCount, paymentMethod, number, timestamp) {
            const timeStr = new Date(timestamp).toLocaleString('bn-BD', { timeZone: 'Asia/Dhaka' });
            const typeEmoji = typeName === 'কুকিজ' ? '🍪' : '🔐';
            
            let message = `✅ আপনার সাবমিশন সফল হয়েছে! ✅

━━━━━━━━━━━━━━━━━━━━
${typeEmoji} একাউন্ট টাইপ: ${typeName}
📊 মোট সাবমিট: ${uniqueCount + duplicateCount} টি
✅ সফল: ${uniqueCount} টি
⚠️ ডুপ্লিকেট: ${duplicateCount} টি
━━━━━━━━━━━━━━━━━━━━
💰 পেমেন্ট মেথড: ${paymentMethod}
📞 পেমেন্ট নাম্বার: ${number}
━━━━━━━━━━━━━━━━━━━━
⏰ সময়: ${timeStr}

আমাদের সাথে থাকার জন্য ধন্যবাদ! 🙏
EBH TEAM - Earning By Habib
t.me/earningbyhabib`;

            if (duplicateCount > 0) {
                message = `⚠️ সতর্কতা: ${duplicateCount} টি একাউন্ট আগে থেকে আছে বলে বাদ দেওয়া হয়েছে ⚠️\n\n` + message;
            }
            
            return message;
        }

        // ========== সিস্টেম স্ট্যাটাস চেক ==========
        const systemRef = ref(db, 'settings/system');
        onValue(systemRef, (snapshot) => {
            const data = snapshot.val() || {};
            systemEnabled = data.enabled !== false;
            maintenanceMessage = data.message || 'সিস্টেম মেইনটেন্যান্স মোডে আছে';
            updateUIBasedOnSystemStatus();
        });

        function updateUIBasedOnSystemStatus() {
            const notice = document.getElementById('maintenanceNotice');
            const noticeText = document.getElementById('maintenanceMessageText');
            const submitBtn = document.getElementById('submitBtn');
            const typeBtns = document.querySelectorAll('.type-btn');
            const paymentSelected = document.getElementById('paymentSelected');
            const inputs = document.querySelectorAll('input, textarea');
            
            if (!systemEnabled) {
                notice.classList.add('show');
                noticeText.textContent = '⛔ ' + maintenanceMessage;
                submitBtn.disabled = true;
                typeBtns.forEach(btn => btn.disabled = true);
                if (paymentSelected) paymentSelected.classList.add('disabled');
                inputs.forEach(input => input.disabled = true);
                document.getElementById('paymentDropdown').classList.remove('show');
            } else {
                notice.classList.remove('show');
                submitBtn.disabled = false;
                typeBtns.forEach(btn => btn.disabled = false);
                if (paymentSelected) paymentSelected.classList.remove('disabled');
                inputs.forEach(input => input.disabled = false);
            }
        }

        // ========== পেমেন্ট ড্রপডাউন লোড ==========
        const paymentMethodsRef = ref(db, 'settings/paymentMethods');
        
        onValue(paymentMethodsRef, (snapshot) => {
            const settings = snapshot.val() || {};
            renderPaymentDropdown(settings);
        });

        function renderPaymentDropdown(settings) {
            const dropdown = document.getElementById('paymentDropdown');
            dropdown.innerHTML = '';

            const methodList = [
                { id: 'inbox', name: '📨 টাকা পরে নেব (ইনবক্সে হিসাব দিন)' },
                { id: 'bkash', name: '💳 বিকাশ' },
                { id: 'nagad', name: '💵 নগদ' },
                { id: 'rocket', name: '🚀 রকেট' },
                { id: 'bkashNagad', name: '💳+💵 বিকাশ+নগদ (একই নাম্বার)' },
                { id: 'mobileRecharge', name: '📱 মোবাইল রিচার্জ' },
                { id: 'binance', name: '₿ বাইন্যান্স' }
            ];

            methodList.forEach(method => {
                const div = document.createElement('div');
                div.className = 'payment-option';
                div.textContent = method.name;
                
                if (settings[method.id] === false) {
                    div.classList.add('disabled-option');
                } else {
                    div.onclick = () => {
                        if (!systemEnabled) {
                            showToast('সিস্টেম বন্ধ আছে', 'warning');
                            return;
                        }
                        
                        selectedPayment = method.name;
                        selectedPaymentId = method.id;
                        document.getElementById('selectedPaymentText').textContent = method.name;
                        document.getElementById('paymentDropdown').classList.remove('show');
                        
                        const numberField = document.getElementById('number');
                        
                        if (method.id === 'inbox') {
                            numberField.disabled = true;
                            numberField.value = '';
                            numberField.placeholder = 'নাম্বার লাগবে না';
                            numberField.style.background = '#2a2f40';
                            showToast('📨 ইনবক্স পেমেন্ট সিলেক্ট করা হয়েছে', 'success');
                        } else {
                            numberField.disabled = false;
                            numberField.placeholder = '017xxxxxxxx';
                            numberField.style.background = '';
                        }
                    };
                }
                dropdown.appendChild(div);
            });
        }

        window.togglePaymentDropdown = function() {
            if (!systemEnabled) {
                showToast('সিস্টেম বন্ধ আছে', 'warning');
                return;
            }
            document.getElementById('paymentDropdown').classList.toggle('show');
        };

        document.addEventListener('click', function(event) {
            if (!event.target.closest('.payment-selector')) {
                document.getElementById('paymentDropdown').classList.remove('show');
            }
        });

        window.selectType = function(type) {
            if (!systemEnabled) {
                showToast('সিস্টেম বন্ধ আছে', 'warning');
                return;
            }
            selectedType = type;
            document.getElementById('typeCookies').classList.remove('active');
            document.getElementById('type2fa').classList.remove('active');
            document.getElementById('type' + (type === 'cookies' ? 'Cookies' : '2fa')).classList.add('active');
        };

        window.countAccounts = function() {
            const text = document.getElementById('usernames').value;
            const count = text.split('\n').filter(line => line.trim() !== '').length;
            document.getElementById('accountCount').textContent = count;
        };

        async function checkExistingUsernames(usernames) {
            try {
                const uniqueSet = new Set();
                const localDuplicates = new Set();
                
                usernames.forEach(u => {
                    const trimmed = u.trim();
                    if (uniqueSet.has(trimmed)) localDuplicates.add(trimmed);
                    else uniqueSet.add(trimmed);
                });

                const uniqueUsernames = Array.from(uniqueSet);
                
                const snapshot = await get(ref(db, 'submits'));
                const existingUsernames = new Set();
                
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    Object.values(data).forEach(item => {
                        if (item.username) {
                            existingUsernames.add(item.username);
                        }
                    });
                }

                const finalUnique = uniqueUsernames.filter(u => !existingUsernames.has(u));
                const dbDuplicates = uniqueUsernames.filter(u => existingUsernames.has(u));

                return {
                    duplicates: Array.from(new Set([...localDuplicates, ...dbDuplicates])),
                    uniqueUsernames: finalUnique
                };

            } catch (error) {
                console.error('ডুপ্লিকেট চেক করতে সমস্যা:', error);
                return {
                    duplicates: [],
                    uniqueUsernames: usernames
                };
            }
        }

        window.submitData = async function() {
            if (!systemEnabled) {
                showToast('সিস্টেম বন্ধ আছে: ' + maintenanceMessage, 'warning');
                return;
            }

            if (!selectedType) {
                showToast('কুকিজ বা 2FA সিলেক্ট করুন', 'warning');
                return;
            }

            const usernamesText = document.getElementById('usernames').value;
            if (!usernamesText.trim()) {
                showToast('কমপক্ষে একটি ইউজারনেম দিন', 'warning');
                return;
            }

            let telegram = document.getElementById('telegram').value.trim();
            if (!telegram || telegram === '@' || telegram.length < 2) {
                showToast('সঠিক টেলিগ্রাম ইউজারনেম দিন', 'warning');
                return;
            }
            if (telegram && !telegram.startsWith('@')) {
                telegram = '@' + telegram;
            }

            if (!selectedPayment) {
                showToast('পেমেন্ট মেথড সিলেক্ট করুন', 'warning');
                return;
            }

            let number = document.getElementById('number').value.trim();
            const isInbox = selectedPaymentId === 'inbox';
            
            if (!isInbox) {
                if (!number) {
                    showToast('পেমেন্ট নাম্বার দিন', 'warning');
                    return;
                }
                if (number.length < 11) {
                    showToast('সঠিক নাম্বার দিন (১১ ডিজিট)', 'warning');
                    return;
                }
            } else {
                number = 'ইনবক্সে দেওয়া হবে';
            }

            const usernames = usernamesText.split('\n')
                .map(u => u.trim())
                .filter(u => u.length > 0);

            const submitBtn = document.getElementById('submitBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const telegramNotifyStatus = document.getElementById('telegramNotifyStatus');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> প্রসেসিং...';
            progressBar.style.display = 'block';
            progressFill.style.width = '30%';
            telegramNotifyStatus.innerHTML = '';

            try {
                const { duplicates, uniqueUsernames } = await checkExistingUsernames(usernames);
                progressFill.style.width = '70%';

                const timestamp = Date.now();
                const promises = uniqueUsernames.map(username => 
                    push(ref(db, 'submits'), {
                        username,
                        telegram: telegram.replace('@', ''),
                        paymentMethod: selectedPayment,
                        paymentId: selectedPaymentId,
                        number,
                        timestamp,
                        status: 'pending',
                        type: selectedType
                    })
                );

                await Promise.all(promises);
                progressFill.style.width = '100%';

                const typeName = selectedType === 'cookies' ? 'কুকিজ' : '2FA';
                
                lastSubmission = {
                    telegram,
                    typeName,
                    uniqueCount: uniqueUsernames.length,
                    duplicateCount: duplicates.length,
                    paymentMethod: selectedPayment,
                    paymentId: selectedPaymentId,
                    number,
                    timestamp,
                    usernames: uniqueUsernames
                };

                const resultBox = document.getElementById('resultBox');
                const resultMessage = document.getElementById('resultMessage');
                const receiptDetails = document.getElementById('receiptDetails');
                
                if (uniqueUsernames.length === 0) {
                    resultMessage.innerHTML = '<span class="duplicate-text">⚠️ সব ইউজারনেম ডুপ্লিকেট!</span>';
                    receiptDetails.innerHTML = '';
                } else {
                    resultMessage.innerHTML = `
                        <span class="success-text">✅ ${uniqueUsernames.length} টি ${typeName} সেভ হয়েছে</span>
                        ${duplicates.length > 0 ? `<br><span class="duplicate-text">⚠️ ${duplicates.length} টি ডুপ্লিকেট বাদ দেওয়া হয়েছে</span>` : ''}
                    `;
                    
                    receiptDetails.innerHTML = `
                        <div><span class="label">👤 টেলিগ্রাম:</span> <span class="value">${telegram}</span></div>
                        <div><span class="label">📊 টাইপ:</span> <span class="value">${typeName}</span></div>
                        <div><span class="label">✅ সফল:</span> <span class="value">${uniqueUsernames.length} টি</span></div>
                        ${duplicates.length > 0 ? `<div><span class="label">⚠️ ডুপ্লিকেট:</span> <span class="value">${duplicates.length} টি</span></div>` : ''}
                        <div><span class="label">💰 পেমেন্ট:</span> <span class="value">${selectedPayment}</span></div>
                        <div><span class="label">📞 নাম্বার:</span> <span class="value">${number}</span></div>
                        <div><span class="label">⏰ সময়:</span> <span class="value">${new Date().toLocaleString('bn-BD')}</span></div>
                    `;
                }
                
                resultBox.classList.add('show');

                // ========== টেলিগ্রাম মেসেজ পাঠানো ==========
                if (uniqueUsernames.length > 0) {
                    // Chat ID পাওয়ার চেষ্টা
                    const chatId = await getUserChatId(telegram);
                    
                    if (chatId) {
                        const confirmationMessage = createConfirmationMessage(
                            typeName, 
                            uniqueUsernames.length, 
                            duplicates.length, 
                            selectedPayment, 
                            number, 
                            timestamp
                        );
                        
                        const messageSent = await sendTelegramMessage(chatId, confirmationMessage);
                        
                        if (messageSent) {
                            telegramNotifyStatus.innerHTML = '<i class="fas fa-check-circle"></i> ✅ টেলিগ্রামে কনফার্মেশন মেসেজ পাঠানো হয়েছে';
                            telegramNotifyStatus.style.color = '#4CAF50';
                        } else {
                            telegramNotifyStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ টেলিগ্রাম মেসেজ পাঠাতে সমস্যা হয়েছে';
                            telegramNotifyStatus.style.color = '#ffd700';
                        }
                    } else {
                        telegramNotifyStatus.innerHTML = '<i class="fas fa-info-circle"></i> ℹ️ আপনার টেলিগ্রাম অ্যাকাউন্ট নিবন্ধিত নেই। @ebh_payment_bot এ /start দিন';
                        telegramNotifyStatus.style.color = '#ffd700';
                    }
                    
                    showToast(`${uniqueUsernames.length} টি একাউন্ট সেভ হয়েছে`, 'success');
                    
                    // ফর্ম ক্লিয়ার
                    document.getElementById('usernames').value = '';
                    document.getElementById('accountCount').textContent = '০';
                    document.getElementById('telegram').value = '@';
                    document.getElementById('number').value = '';
                    document.getElementById('number').disabled = false;
                    document.getElementById('number').style.background = '';
                    
                    selectedPayment = '';
                    selectedPaymentId = '';
                    selectedType = '';
                    document.getElementById('typeCookies').classList.remove('active');
                    document.getElementById('type2fa').classList.remove('active');
                    document.getElementById('selectedPaymentText').textContent = 'সিলেক্ট করুন';
                }

            } catch (error) {
                console.error('Error:', error);
                showToast('সমস্যা: ' + error.message, 'error');
                telegramNotifyStatus.innerHTML = '<i class="fas fa-exclamation-circle"></i> ❌ সাবমিট করতে সমস্যা হয়েছে';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> সাবমিট করুন';
                progressBar.style.display = 'none';
            }
        };

        window.downloadPNG = function() {
            if (!lastSubmission) {
                showToast('কোন রিসিট নেই', 'warning');
                return;
            }

            try {
                const canvasDiv = document.getElementById('receiptCanvas');
                
                let numberDisplay = lastSubmission.number;
                if (lastSubmission.paymentId === 'inbox') {
                    numberDisplay = 'নাম্বার ইনবক্সে দেয়া হবে';
                }

                const timeStr = new Date(lastSubmission.timestamp).toLocaleString('bn-BD', { 
                    timeZone: 'Asia/Dhaka'
                });
                
                let usernamesHTML = '';
                lastSubmission.usernames.slice(0, 15).forEach(u => {
                    usernamesHTML += `<div style="color: #ccc; font-size: 12px; margin-bottom: 3px;">• ${u}</div>`;
                });
                if (lastSubmission.usernames.length > 15) {
                    usernamesHTML += `<div style="color: #ffd700; font-size: 12px;">... এবং আরও ${lastSubmission.usernames.length - 15} টি</div>`;
                }
                
                canvasDiv.innerHTML = `
                    <div style="font-family: Arial, sans-serif; background: #0a0f1e; color: white; padding: 25px;">
                        <div style="text-align: center; margin-bottom: 20px;">
                            <div style="font-size: 36px; font-weight: bold; color: #ffd700;">EBH TEAM</div>
                            <div style="font-size: 18px; color: #ffd700;">Earning By Habib</div>
                            <div style="height: 2px; background: #ffd700; margin: 15px 0;"></div>
                        </div>
                        
                        <div style="margin: 15px 0;">
                            <div style="display: flex; margin-bottom: 8px;"><span style="color: #ffd700; width: 120px;">টেলিগ্রাম:</span><span>${lastSubmission.telegram}</span></div>
                            <div style="display: flex; margin-bottom: 8px;"><span style="color: #ffd700; width: 120px;">একাউন্ট টাইপ:</span><span>${lastSubmission.typeName}</span></div>
                            <div style="display: flex; margin-bottom: 8px;"><span style="color: #ffd700; width: 120px;">সফল:</span><span style="color: #4CAF50;">${lastSubmission.uniqueCount} টি</span></div>
                            ${lastSubmission.duplicateCount > 0 ? `<div style="display: flex; margin-bottom: 8px;"><span style="color: #ffd700; width: 120px;">ডুপ্লিকেট:</span><span style="color: #ffd700;">${lastSubmission.duplicateCount} টি</span></div>` : ''}
                            <div style="display: flex; margin-bottom: 8px;"><span style="color: #ffd700; width: 120px;">পেমেন্ট:</span><span>${lastSubmission.paymentMethod}</span></div>
                            <div style="display: flex; margin-bottom: 8px;"><span style="color: #ffd700; width: 120px;">নাম্বার:</span><span>${numberDisplay}</span></div>
                            <div style="display: flex; margin-bottom: 15px;"><span style="color: #ffd700; width: 120px;">সময়:</span><span>${timeStr}</span></div>
                        </div>
                        
                        <div style="height: 2px; background: #ffd700; margin: 15px 0;"></div>
                        
                        <div style="margin-top: 15px;">
                            <div style="color: #ffd700; font-size: 16px; margin-bottom: 10px;">ইউজারনেম সমূহ:</div>
                            ${usernamesHTML}
                        </div>
                        
                        <div style="height: 2px; background: #ffd700; margin: 20px 0;"></div>
                        
                        <div style="text-align: center;">
                            <div style="color: #ffd700; font-size: 13px;">আমাদের সাথে থাকার জন্য আপনাকে ধন্যবাদ!</div>
                            <div style="color: #666; font-size: 12px; margin-top: 10px;">EBH TEAM - EARNING BY HABIB</div>
                        </div>
                    </div>
                `;
                
                html2canvas(canvasDiv, {
                    scale: 2,
                    backgroundColor: '#0a0f1e',
                    logging: false
                }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `EBH_Receipt_${lastSubmission.telegram.replace('@', '')}_${Date.now()}.png`;
                    link.href = imgData;
                    link.click();
                    showToast('PNG ডাউনলোড শুরু হয়েছে', 'success');
                });
                
            } catch (error) {
                console.error('PNG error:', error);
                showToast('PNG তৈরি করতে সমস্যা', 'error');
            }
        };

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type} show`;
            toast.innerHTML = message;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        window.countAccounts();
    </script>
</body>
