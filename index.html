<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EBH TEAM | পেমেন্ট সিস্টেম</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #e2e8f0;
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding-top: 10px;
        }

        .main-card {
            background: #ffffff;
            border-radius: 32px;
            padding: 22px 18px;
            border: 1px solid rgba(37, 99, 235, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .gold-logo {
            font-size: 32px;
            font-weight: 900;
            font-family: 'Orbitron', 'Rajdhani', sans-serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #2563eb;
            text-shadow: 2px 2px 0 #dbeafe;
        }
        
        .logo-badge {
            display: inline-block;
            background: linear-gradient(145deg, #2563eb, #1d4ed8);
            color: #fff;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
        }

        .maintenance-notice {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid #ef4444;
            color: #ef4444;
            padding: 16px 20px;
            border-radius: 40px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 20px;
            display: none;
        }
        
        .maintenance-notice.show {
            display: block;
        }

        .type-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 8px;
        }
        
        .type-btn {
            padding: 14px 5px;
            border-radius: 60px;
            text-align: center;
            font-weight: 700;
            font-size: 13px;
            border: none;
            background: #e2e8f0;
            color: #1e293b;
            box-shadow: 0 4px 0 #cbd5e1;
            cursor: pointer;
            transition: 0.1s ease;
            white-space: normal;
            word-break: break-word;
            line-height: 1.3;
            min-height: 65px;
        }
        
        .type-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #cbd5e1;
        }
        
        .type-btn.active { 
            background: #2563eb; 
            color: #fff; 
            box-shadow: 0 4px 0 #1d4ed8;
        }
        
        .type-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 4px 0 #cbd5e1;
            filter: grayscale(0.2);
        }
        
        .type-btn.disabled-type {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.2);
            position: relative;
        }
        .type-btn.disabled-type::after {
            content: " 🔒 বন্ধ";
            font-size: 9px;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 30px;
            margin-left: 5px;
            white-space: nowrap;
        }

        .more-btn-container {
            display: flex;
            justify-content: center;
            margin: 5px 0 20px 0;
        }
        .more-btn {
            background: linear-gradient(145deg, #475569, #334155);
            width: auto;
            min-width: 160px;
            padding: 12px 28px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 60px;
            box-shadow: 0 4px 0 #1e293b;
            transition: 0.1s ease;
            letter-spacing: 1px;
            cursor: pointer;
            border: none;
            color: white;
        }
        .more-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1e293b;
        }
        .more-btn:disabled {
            opacity: 1 !important;
            cursor: pointer !important;
            filter: none !important;
        }
        
        .extra-types {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .extra-types.show {
            display: grid;
        }

        .username-container {
            position: relative;
            margin-bottom: 18px;
        }
        
        .username-label {
            display: block;
            color: #2563eb;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .username-input {
            width: 100%;
            padding: 16px 20px;
            background: #f8fafc;
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 40px;
            font-size: 15px;
            color: #1e293b;
            resize: vertical;
            min-height: 100px;
            padding-right: 70px;
        }
        
        .username-input:focus {
            outline: none;
            border-color: #2563eb;
        }
        
        .username-counter {
            position: absolute;
            right: 15px;
            bottom: 14px;
            background: rgba(37, 99, 235, 0.1);
            color: #2563eb;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #2563eb;
            pointer-events: none;
        }

        .input-group {
            margin-bottom: 18px;
        }
        
        .input-label {
            display: block;
            color: #2563eb;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
        }
        
        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: #f8fafc;
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 40px;
            font-size: 15px;
            color: #1e293b;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #2563eb;
        }
        .input-field:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .save-btn-small {
            background: #22c55e;
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            color: white;
            font-weight: bold;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: 0 3px 0 #15803d;
            transition: 0.1s;
            margin-left: 10px;
        }
        .save-btn-small:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #15803d;
        }
        .telegram-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .telegram-header .input-label {
            margin-bottom: 0;
        }

        .payment-selector {
            position: relative;
            margin-bottom: 18px;
        }
        
        .payment-selected {
            width: 100%;
            padding: 16px 20px;
            background: #f8fafc;
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1e293b;
            cursor: pointer;
        }
        
        .payment-selected.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .payment-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #ffffff;
            border-radius: 25px;
            margin-top: 5px;
            overflow: hidden;
            z-index: 100;
            display: none;
            border: 2px solid #2563eb;
            max-height: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .payment-dropdown.show {
            display: block;
        }
        
        .payment-option {
            padding: 14px 18px;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        
        .payment-option:last-child {
            border-bottom: none;
        }
        
        .payment-option:hover, .payment-option:active {
            background: #2563eb;
            color: #fff;
        }
        
        .payment-option.disabled-option {
            opacity: 0.5;
            pointer-events: none;
            background: #f1f5f9;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(145deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 8px 0 #1e3a8a;
            cursor: pointer;
            transition: 0.1s;
            margin: 8px 0 16px 0;
        }
        
        .submit-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #1e3a8a;
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 8px 0 #1e3a8a;
            cursor: not-allowed;
        }

        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            margin: 15px 0;
            display: none;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #60a5fa);
            width: 0%;
            transition: width 0.2s ease;
        }

        .result-box {
            background: rgba(37, 99, 235, 0.05);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #2563eb;
            display: none;
        }
        
        .result-box.show {
            display: block;
        }
        
        .success-text {
            color: #22c55e;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .duplicate-text {
            color: #f59e0b;
        }

        .receipt-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(145deg, #10b981, #059669);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 5px 0 #047857;
            transition: 0.1s;
        }
        
        .receipt-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #047857;
        }
        
        .receipt-details {
            background: rgba(0,0,0,0.03);
            border-radius: 16px;
            padding: 15px;
            margin: 10px 0;
            font-size: 14px;
            color: #1e293b;
            line-height: 2;
            border: 1px solid rgba(37, 99, 235, 0.2);
        }
        
        .receipt-details div {
            display: flex;
            border-bottom: 1px dashed rgba(37, 99, 235, 0.2);
            padding: 5px 0;
        }
        
        .receipt-details span.label {
            color: #2563eb;
            font-weight: bold;
            width: 100px;
        }
        
        .receipt-details span.value {
            color: #1e293b;
            flex: 1;
        }

        .double-btn-container {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .history-toggle-btn {
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 0 #1e3a8a;
            transition: 0.1s;
            flex: 1;
            justify-content: center;
            min-width: 160px;
        }
        .history-toggle-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1e3a8a;
        }
        .report-check-btn {
            background: linear-gradient(145deg, #f97316, #ea580c);
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 0 #9a3412;
            transition: 0.1s;
            flex: 1;
            justify-content: center;
            min-width: 160px;
        }
        .report-check-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #9a3412;
        }

        .back-btn {
            background: #e2e8f0;
            border: 1px solid #2563eb;
            padding: 10px 20px;
            border-radius: 40px;
            color: #2563eb;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 0 #cbd5e1;
        }
        .back-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #cbd5e1;
        }

        .history-view {
            display: none;
        }
        .history-view.show {
            display: block;
        }
        .submit-view {
            display: block;
        }
        .submit-view.hide {
            display: none;
        }

        .history-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px;
        }
        .history-title {
            color: #2563eb;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .history-list {
            max-height: 500px;
            overflow-y: auto;
        }
        .history-item {
            background: rgba(37, 99, 235, 0.03);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #2563eb;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .history-type {
            font-weight: bold;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
        }
        .history-type.cookies { background: #3b82f6; }
        .history-type.twofa { background: #8b5cf6; }
        .history-type.fb02fnd2fa { background: #22c55e; }
        .history-type.fb02fndcookies { background: #f59e0b; }
        .history-type.fbhotmail2fa { background: #a855f7; }
        .history-type.fbhotmailcookies { background: #14b8a6; }
        .history-type.fbpc1000 { background: #ef4444; }
        .history-type.fbpc6155 { background: #f97316; }
        
        .history-status {
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 20px;
            color: white;
        }
        .history-status.pending { background: #f59e0b; color: #000; }
        .history-status.approved { background: #22c55e; color: #000; }
        .history-stats {
            display: flex;
            gap: 15px;
            font-size: 13px;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        .history-stats span {
            background: rgba(0,0,0,0.05);
            padding: 4px 10px;
            border-radius: 20px;
            color: #1e293b;
        }
        .history-rate {
            color: #2563eb;
            font-size: 13px;
        }
        .history-amount {
            color: #22c55e;
            font-weight: bold;
            font-size: 15px;
        }
        .history-time {
            font-size: 11px;
            color: #64748b;
            margin-top: 5px;
        }
        .empty-history {
            text-align: center;
            padding: 30px;
            color: #64748b;
        }

        .rules-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px;
            margin-top: 10px;
        }
        
        .rules-title {
            color: #2563eb;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        
        .rule-item {
            background: rgba(37, 99, 235, 0.03);
            padding: 10px 12px;
            border-radius: 16px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #1e293b;
        }
        
        .rule-icon {
            width: 22px;
            height: 22px;
            background: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 12px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            left: 20px;
            background: #1e293b;
            color: white;
            padding: 14px 18px;
            border-radius: 30px;
            transform: translateY(-150%);
            transition: 0.3s;
            z-index: 9999;
            border-left: 6px solid;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            font-size: 14px;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .toast.show {
            transform: translateY(0);
        }
        
        .toast.success { border-left-color: #22c55e; background: #1e293b; }
        .toast.error { border-left-color: #ef4444; background: #1e293b; }
        .toast.warning { border-left-color: #f59e0b; background: #1e293b; }
        
        .telegram-notify {
            font-size: 12px;
            color: #22c55e;
            margin-top: 5px;
            text-align: center;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <div class="logo-area">
                <div class="gold-logo">EBH TEAM</div>
                <div class="logo-badge">✦ Earning By Habib ✦</div>
            </div>

            <div id="maintenanceNotice" class="maintenance-notice">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="maintenanceMessageText">সিস্টেম বন্ধ আছে</span>
            </div>

            <div id="submitView" class="submit-view">
                <div class="type-grid" id="mainTypeGrid"></div>

                <div class="more-btn-container">
                    <button class="more-btn" id="moreToggleBtn" onclick="toggleExtraTypes()">📂 মোর অপশন ▼</button>
                </div>

                <div class="extra-types" id="extraTypesContainer"></div>

                <div class="username-container">
                    <label class="username-label">📝 ইউজারনেম (প্রতি লাইনে একটি)</label>
                    <textarea class="username-input" id="usernames" placeholder="username1&#10;username2" oninput="countAccounts()" rows="4"></textarea>
                    <div class="username-counter" id="accountCount">০</div>
                </div>

                <div class="input-group">
                    <div class="telegram-header">
                        <label class="input-label">📱 টেলিগ্রাম ইউজারনেম</label>
                        <button class="save-btn-small" id="saveUserDataBtn"><i class="fas fa-save"></i> সেভ</button>
                    </div>
                    <input class="input-field" type="text" id="telegram" placeholder="@username" value="@">
                </div>

                <div class="input-group">
                    <label class="input-label">💰 পেমেন্ট মেথড</label>
                    <div class="payment-selector">
                        <div class="payment-selected" id="paymentSelected" onclick="togglePaymentDropdown()">
                            <span id="selectedPaymentText">সিলেক্ট করুন</span>
                            <span>▼</span>
                        </div>
                        <div class="payment-dropdown" id="paymentDropdown"></div>
                    </div>
                </div>

                <div class="input-group" id="numberGroup">
                    <label class="input-label">📞 পেমেন্ট নম্বর</label>
                    <input class="input-field" type="text" id="number" placeholder="017xxxxxxxx">
                </div>

                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <button class="submit-btn" onclick="submitData()" id="submitBtn">
                    <i class="fas fa-paper-plane" style="margin-right: 8px;"></i>
                    সাবমিট করুন
                </button>

                <div class="result-box" id="resultBox">
                    <div id="resultMessage"></div>
                    <div class="receipt-details" id="receiptDetails"></div>
                    <div id="telegramNotifyStatus" class="telegram-notify"></div>
                    <button class="receipt-btn" onclick="downloadPNG()" id="receiptBtn">
                        <i class="fas fa-image"></i>
                        PNG রিসিট ডাউনলোড করুন
                    </button>
                </div>
            </div>

            <div id="historyView" class="history-view">
                <div class="history-card">
                    <button class="back-btn" onclick="showSubmitView()"><i class="fas fa-arrow-left"></i> সাবমিট প্যানেলে ফিরুন</button>
                    <div class="history-title">
                        <i class="fas fa-clock"></i> আমার সাবমিট হিস্টোরি
                    </div>
                    <div id="historyList" class="history-list">
                        <div class="empty-history">লোড হচ্ছে...</div>
                    </div>
                </div>
            </div>

            <div class="double-btn-container" id="doubleBtnContainer">
                <button class="history-toggle-btn" onclick="showHistoryView()">
                    <i class="fas fa-history"></i> 📜 আমার হিস্টোরি
                </button>
                <button class="report-check-btn" id="reportCheckBtn">
                    <i class="fas fa-chart-line"></i> Report Check
                </button>
            </div>
        </div>

        <div class="rules-card">
            <div class="rules-title"><i class="fas fa-shield-alt"></i> নিয়মাবলী</div>
            <div class="rule-item"><div class="rule-icon">১</div>১১০ টাকার নিচে = মোবাইল রিচার্জ/বাইনান্স</div>
            <div class="rule-item"><div class="rule-icon">২</div>১১০ টাকার উপরে = বিকাশ/নগদ/রকেট</div>

        async function loadDuplicateReports() {
            try {
                const reportsRef = ref(secondDB, 'reports');
                const snapshot = await get(reportsRef);
                if (snapshot.exists()) {
                    const reports = snapshot.val();
                    duplicateReportsMap.clear();
                    for (const date in reports) {
                        const dateData = reports[date];
                        if (dateData && dateData.users) {
                            for (const type in dateData.users) {
                                const typeUsers = dateData.users[type];
                                if (typeUsers && typeof typeUsers === 'object') {
                                    for (const encodedUsername in typeUsers) {
                                        duplicateReportsMap.set(encodedUsername, type);
                                    }
                                }
                            }
                        }
                    }
                }
            } catch (error) { console.error(error); }
        }
        
        function encodeUsername(username) {
            if (!username) return '';
            let encoded = '';
            for (let i = 0; i < username.length; i++) {
                const char = username[i];
                if (char === '.') encoded += '_x2E_';
                else if (char === '#') encoded += '_x23_';
                else if (char === '$') encoded += '_x24_';
                else if (char === '[') encoded += '_x5B_';
                else if (char === ']') encoded += '_x5D_';
                else if (char === '/') encoded += '_x2F_';
                else if (char === '\\') encoded += '_x5C_';
                else encoded += char;
            }
            return encoded;
        }
        
        function isUsernameDuplicate(username) {
            const encoded = encodeUsername(username);
            return duplicateReportsMap.has(encoded);
        }
        
        function countDuplicatesInList(usernames) {
            if (!usernames || usernames.length === 0) return 0;
            return usernames.filter(u => isUsernameDuplicate(u)).length;

            if (userRatesCache[cleanTelegram] && userRatesCache[cleanTelegram][type]) {

            }
            return DEFAULT_RATES[type] || 2.00;
        }

            const paymentSelectedDiv = document.getElementById('paymentSelected');
            const inputs = document.querySelectorAll('#submitView input, #submitView textarea');
            const typeBtns = document.querySelectorAll('.type-grid .type-btn, .extra-types .type-btn');
            
            if (!systemEnabled) {
                notice.classList.add('show');
                noticeText.textContent = '⛔ ' + maintenanceMessage;
                submitBtn.disabled = true;
                typeBtns.forEach(btn => btn.disabled = true);
                if (paymentSelectedDiv) paymentSelectedDiv.classList.add('disabled');
                inputs.forEach(input => input.disabled = true);
                document.getElementById('paymentDropdown').classList.remove('show');
            } else {
                notice.classList.remove('show');
                submitBtn.disabled = false;
                renderButtons();
                if (paymentSelectedDiv) paymentSelectedDiv.classList.remove('disabled');
                inputs.forEach(input => input.disabled = false);
                const numberField = document.getElementById('number');
                if (selectedPaymentId === 'inbox') numberField.disabled = true;
                else numberField.disabled = false;
            }
            const moreBtn = document.getElementById('moreToggleBtn');
            if (moreBtn) moreBtn.disabled = false;
        }

        const paymentMethodsRef = ref(db, 'settings/paymentMethods');
        onValue(paymentMethodsRef, (snapshot) => {
            const settings = snapshot.val() || {};
            renderPaymentDropdown(settings);
        });

        function renderPaymentDropdown(settings) {
            const dropdown = document.getElementById('paymentDropdown');
            dropdown.innerHTML = '';
            const methodList = [
                { id: 'inbox', name: '📨 টাকা পরে নেব (ইনবক্সে হিসাব দিন)' },
                { id: 'bkash', name: '💳 বিকাশ' },
                { id: 'nagad', name: '💵 নগদ' },
                { id: 'rocket', name: '🚀 রকেট' },
                { id: 'bkashNagad', name: '💳+💵 বিকাশ+নগদ (একই নাম্বার)' },
                { id: 'mobileRecharge', name: '📱 মোবাইল রিচার্জ' },
                { id: 'binance', name: '₿ বাইন্যান্স' }
            ];
            methodList.forEach(method => {
                const div = document.createElement('div');
                div.className = 'payment-option';
                div.textContent = method.name;
                if (settings[method.id] === false) {
                    div.classList.add('disabled-option');
                } else {
                    div.onclick = () => {
                        if (!systemEnabled) { showToast('সিস্টেম বন্ধ আছে', 'warning'); return; }
                        if (settings[method.id] === false) {
                            showToast('এই পেমেন্ট মেথড বর্তমানে বন্ধ আছে', 'warning');
                            return;
                        }
                        selectedPayment = method.name;
                        selectedPaymentId = method.id;
                        document.getElementById('selectedPaymentText').textContent = method.name;
                        document.getElementById('paymentDropdown').classList.remove('show');
                        const numberField = document.getElementById('number');
                        if (method.id === 'inbox') {
                            numberField.disabled = true;
                            numberField.value = '';
                            numberField.placeholder = 'নাম্বার লাগবে না';
                            showToast('📨 ইনবক্স পেমেন্ট সিলেক্ট করা হয়েছে', 'success');
                        } else {
                            numberField.disabled = false;
                            numberField.placeholder = '017xxxxxxxx';
                        }
                    };
                }
                dropdown.appendChild(div);
            });
        }

        window.togglePaymentDropdown = function() {
            if (!systemEnabled) { showToast('সিস্টেম বন্ধ আছে', 'warning'); return; }
            document.getElementById('paymentDropdown').classList.toggle('show');
        };
        document.addEventListener('click', function(event) {
            if (!event.target.closest('.payment-selector')) {
                document.getElementById('paymentDropdown').classList.remove('show');
            }
        });

        window.countAccounts = function() {
            const text = document.getElementById('usernames').value;
            const count = text.split('\n').filter(line => line.trim() !== '').length;
            document.getElementById('accountCount').textContent = count;
        };

        async function checkExistingUsernamesFast(usernames) {
            const uniqueSet = new Set();
            const localDuplicates = new Set();
            usernames.forEach(u => {
                const trimmed = u.trim();
                if (uniqueSet.has(trimmed)) localDuplicates.add(trimmed);
                else uniqueSet.add(trimmed);
            });
            const uniqueUsernamesRaw = Array.from(uniqueSet);
            const snapshot = await get(ref(db, 'submits'));
            const existingUsernames = new Set();
            if (snapshot.exists()) {
                const data = snapshot.val();
                Object.values(data).forEach(item => { if (item.username) existingUsernames.add(item.username); });
            }
            const finalUnique = uniqueUsernamesRaw.filter(u => !existingUsernames.has(u));
            const dbDuplicates = uniqueUsernamesRaw.filter(u => existingUsernames.has(u));
            const allDuplicates = [...new Set([...localDuplicates, ...dbDuplicates])];
            return { duplicates: allDuplicates, uniqueUsernames: finalUnique };
        }

        window.submitData = async function() {
            if (!systemEnabled) { showToast('সিস্টেম বন্ধ আছে: ' + maintenanceMessage, 'warning'); return; }
            if (!selectedType) { showToast('একটি টাইপ সিলেক্ট করুন', 'warning'); return; }
            if (typeSettings[selectedType] === false) { showToast('এই অপশনটি বর্তমানে বন্ধ আছে', 'warning'); return; }
            
            const usernamesText = document.getElementById('usernames').value;
            if (!usernamesText.trim()) { showToast('কমপক্ষে একটি ইউজারনেম দিন', 'warning'); return; }
            let telegram = document.getElementById('telegram').value.trim();
            if (!telegram || telegram === '@' || telegram.length < 2) { showToast('সঠিক টেলিগ্রাম ইউজারনেম দিন', 'warning'); return; }
            if (telegram && !telegram.startsWith('@')) telegram = '@' + telegram;
            document.getElementById('telegram').value = telegram;
            
            if (!selectedPayment) { showToast('পেমেন্ট মেথড সিলেক্ট করুন', 'warning'); return; }
            
            const paymentSettingsSnap = await get(ref(db, 'settings/paymentMethods'));
            const paymentSettings = paymentSettingsSnap.val() || {};
            if (paymentSettings[selectedPaymentId] === false) {
                showToast('এই পেমেন্ট মেথড বর্তমানে অ্যাডমিন বন্ধ করে দিয়েছেন। নতুন করে সিলেক্ট করুন।', 'warning');
                selectedPayment = '';
                selectedPaymentId = '';
                document.getElementById('selectedPaymentText').textContent = 'সিলেক্ট করুন';
                return;
            }
            
            let number = document.getElementById('number').value.trim();
            const isInbox = selectedPaymentId === 'inbox';
            if (!isInbox && !number) { showToast('পেমেন্ট নাম্বার দিন', 'warning'); return; }
            if (!isInbox && number.length < 11) { showToast('সঠিক নাম্বার দিন (১১ ডিজিট)', 'warning'); return; }
            if (isInbox) number = 'ইনবক্সে দেওয়া হবে';

            const usernames = usernamesText.split('\n').map(u => u.trim()).filter(u => u.length > 0);
            const submitBtn = document.getElementById('submitBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const telegramNotifyStatus = document.getElementById('telegramNotifyStatus');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> প্রসেসিং...';
            progressBar.style.display = 'block';
            progressFill.style.width = '20%';
            telegramNotifyStatus.innerHTML = '';

            try {
                await loadUserRates();
                await loadDuplicateReports();
                const rate = getUserRate(telegram, selectedType);
                
                progressFill.style.width = '40%';
                const { duplicates, uniqueUsernames } = await checkExistingUsernamesFast(usernames);
                progressFill.style.width = '70%';
                const timestamp = Date.now();
                const cleanTelegram = telegram.replace('@', '');
                
                const pushPromises = uniqueUsernames.map(username => push(ref(db, 'submits'), {
                    username, telegram: cleanTelegram, paymentMethod: selectedPayment, paymentId: selectedPaymentId,
                    number, timestamp, status: 'pending', type: selectedType
                }));
                await Promise.all(pushPromises);
                progressFill.style.width = '100%';
                
                let typeName = selectedType;
                const found = [...mainTypeList, ...extraTypeList].find(t => t.dbKey === selectedType);
                if (found) typeName = found.name;
                
                lastSubmission = { telegram: cleanTelegram, typeName, uniqueCount: uniqueUsernames.length, duplicateCount: duplicates.length, paymentMethod: selectedPayment, paymentId: selectedPaymentId, number, timestamp, usernames: uniqueUsernames, rate };
                const resultBox = document.getElementById('resultBox');
                const resultMessage = document.getElementById('resultMessage');
                const receiptDetails = document.getElementById('receiptDetails');
                if (uniqueUsernames.length === 0) {
                    resultMessage.innerHTML = '<span class="duplicate-text">⚠️ সব ইউজারনেম ডুপ্লিকেট!</span>';
                    receiptDetails.innerHTML = '';
                } else {
                    resultMessage.innerHTML = `<span class="success-text">✅ ${uniqueUsernames.length} টি ${typeName} সেভ হয়েছে (রেট: ${rate.toFixed(2)} টাকা/আইডি)</span>${duplicates.length > 0 ? `<br><span class="duplicate-text">⚠️ ${duplicates.length} টি ডুপ্লিকেট বাদ দেওয়া হয়েছে</span>` : ''}`;
                    receiptDetails.innerHTML = `<div><span class="label">👤 টেলিগ্রাম:</span> <span class="value">${telegram}</span></div><div><span class="label">📊 টাইপ:</span> <span class="value">${typeName}</span></div><div><span class="label">✅ সফল:</span> <span class="value">${uniqueUsernames.length} টি</span></div>${duplicates.length > 0 ? `<div><span class="label">⚠️ ডুপ্লিকেট:</span> <span class="value">${duplicates.length} টি</span></div>` : ''}<div><span class="label">💰 রেট:</span> <span class="value">${rate.toFixed(2)} টাকা/আইডি</span></div><div><span class="label">💰 পেমেন্ট:</span> <span class="value">${selectedPayment}</span></div><div><span class="label">📞 নাম্বার:</span> <span class="value">${number}</span></div><div><span class="label">⏰ সময়:</span> <span class="value">${new Date().toLocaleString('bn-BD')}</span></div>`;
                }
                resultBox.classList.add('show');
                if (uniqueUsernames.length > 0) {
                    const chatId = await getUserChatId(telegram);
                    if (chatId) {
                        const msg = createConfirmationMessage(typeName, uniqueUsernames.length, duplicates.length, selectedPayment, number, timestamp, rate);
                        sendTelegramMessage(chatId, msg).then(sent => {
                            if (sent) telegramNotifyStatus.innerHTML = '<i class="fas fa-check-circle"></i> ✅ টেলিগ্রামে কনফার্মেশন পাঠানো হয়েছে';
                            else telegramNotifyStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ মেসেজ পাঠাতে সমস্যা';
                        }).catch(() => {
                            telegramNotifyStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ মেসেজ পাঠাতে সমস্যা';
                        });
                    } else {
                        telegramNotifyStatus.innerHTML = '<i class="fas fa-info-circle"></i> ℹ️ আপনার টেলিগ্রাম নিবন্ধিত নেই। @ebh_payment_bot এ /start দিন';
                    }
                    showToast(`${uniqueUsernames.length} টি একাউন্ট সেভ হয়েছে`, 'success');
                    document.getElementById('usernames').value = '';
                    document.getElementById('accountCount').textContent = '০';
                    document.getElementById('number').value = '';
                    if (selectedPaymentId !== 'inbox') document.getElementById('number').disabled = false;
                }
            } catch (error) {
                console.error(error);
                showToast('সমস্যা: ' + error.message, 'error');
                telegramNotifyStatus.innerHTML = '<i class="fas fa-exclamation-circle"></i> ❌ সাবমিট ব্যর্থ';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> সাবমিট করুন';
                progressBar.style.display = 'none';
            }
        };

        window.downloadPNG = function() {
            if (!lastSubmission) { showToast('কোন রিসিট নেই', 'warning'); return; }
            try {
                const canvasDiv = document.getElementById('receiptCanvas');
                let numberDisplay = lastSubmission.number;
                if (lastSubmission.paymentId === 'inbox') numberDisplay = 'নাম্বার ইনবক্সে দেয়া হবে';
                const timeStr = new Date(lastSubmission.timestamp).toLocaleString('bn-BD', { timeZone: 'Asia/Dhaka' });
                let usernamesHTML = '';
                lastSubmission.usernames.slice(0, 15).forEach(u => { usernamesHTML += `<div style="color: #475569; font-size: 12px;">• ${u}</div>`; });
                if (lastSubmission.usernames.length > 15) usernamesHTML += `<div style="color: #2563eb;">... এবং আরও ${lastSubmission.usernames.length - 15} টি</div>`;
                canvasDiv.innerHTML = `<div style="font-family: Arial; background:#ffffff; color:#1e293b; padding:25px;"><div style="text-align:center;"><div style="font-size:36px; color:#2563eb;">EBH TEAM</div><div style="height:2px; background:#2563eb; margin:15px 0;"></div></div><div><div><span style="color:#2563eb;">টেলিগ্রাম:</span> ${lastSubmission.telegram}</div><div><span style="color:#2563eb;">টাইপ:</span> ${lastSubmission.typeName}</div><div><span style="color:#2563eb;">সফল:</span> ${lastSubmission.uniqueCount} টি</div>${lastSubmission.duplicateCount>0?`<div><span style="color:#2563eb;">ডুপ্লিকেট:</span> ${lastSubmission.duplicateCount} টি</div>`:''}<div><span style="color:#2563eb;">রেট:</span> ${lastSubmission.rate.toFixed(2)} টাকা/আইডি</div><div><span style="color:#2563eb;">পেমেন্ট:</span> ${lastSubmission.paymentMethod}</div><div><span style="color:#2563eb;">নাম্বার:</span> ${numberDisplay}</div><div><span style="color:#2563eb;">সময়:</span> ${timeStr}</div></div><div style="height:2px; background:#2563eb; margin:15px 0;"></div><div><div style="color:#2563eb;">ইউজারনেম সমূহ:</div>${usernamesHTML}</div><div style="text-align:center; margin-top:20px; color:#2563eb;">EBH TEAM</div></div>`;
                html2canvas(canvasDiv, { scale: 2, backgroundColor: '#ffffff' }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `EBH_Receipt_${Date.now()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    showToast('PNG ডাউনলোড শুরু', 'success');
                });
            } catch(e) { showToast('PNG error', 'error'); }
        };

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type} show`;
            toast.innerHTML = message;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.getElementById('saveUserDataBtn').addEventListener('click', saveTelegramOnly);
        
        // Initialize everything
        loadSavedTelegramOnly();
        testBotConnection(); // Test bot connection on startup
        checkTelegramUpdates(); // Start polling for /start commands
        window.countAccounts();
        renderButtons();
        
        const submitsRef = ref(db, 'submits');
        onValue(submitsRef, () => {
            if (document.getElementById('historyView').classList.contains('show')) {
                loadUserHistory();
            }
        });
        
        const reportsRef = ref(secondDB, 'reports');
        onValue(reportsRef, () => {
            loadDuplicateReports();
            if (document.getElementById('historyView').classList.contains('show')) {
                loadUserHistory();
            }
        });
    </script>
</body>
</html>
