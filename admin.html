<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBH Team - অ্যাডমিন প্যানেল</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1e2b 0%, #2d3349 100%);
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: #2d3349;
            padding: 20px 25px;
            border-radius: 50px;
            box-shadow: 
                15px 15px 30px rgba(0,0,0,0.5),
                inset 2px 2px 5px rgba(255,255,255,0.1),
                inset -3px -3px 8px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.2);
        }

        .logo h1 {
            font-size: 36px;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(145deg, #ffd700, #ffa500, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 5px 15px rgba(255,215,0,0.3),
                2px 2px 0 #00000030;
        }

        .stats-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .stat-box {
            background: rgba(255,215,0,0.1);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #ffd700;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-box span {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
        }

        .stat-box label {
            color: #fff;
            font-size: 14px;
        }

        .refresh-btn {
            background: linear-gradient(145deg, #ffd700, #ffa500);
            color: #1a1e2b;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 
                5px 5px 10px rgba(0,0,0,0.4),
                inset -2px -2px 5px rgba(0,0,0,0.2),
                inset 2px 2px 5px rgba(255,255,255,0.3);
        }

        .main-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .main-tab {
            flex: 1;
            padding: 15px 20px;
            border-radius: 40px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.3);
        }

        .main-tab.pending {
            background: linear-gradient(145deg, #ffa502, #ff7f50);
            color: white;
        }

        .main-tab.approved {
            background: linear-gradient(145deg, #26de81, #20bf6b);
            color: white;
        }

        .main-tab:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .main-tab.active {
            transform: scale(1.02);
            box-shadow: 0 0 0 3px #ffd700;
        }

        .main-tab .badge {
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 10px;
            font-size: 14px;
        }

        .type-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .type-tab {
            flex: 1;
            padding: 15px 20px;
            border-radius: 40px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.3);
        }

        .type-tab.cookies {
            background: linear-gradient(145deg, #ff6b6b, #ff4757);
            color: white;
        }

        .type-tab.twofa {
            background: linear-gradient(145deg, #4834d4, #686de0);
            color: white;
        }

        .type-tab:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .type-tab.active {
            transform: scale(1.02);
            box-shadow: 0 0 0 3px #ffd700;
        }

        .type-stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .type-stat-box {
            flex: 1;
            background: #2d3349;
            border-radius: 30px;
            padding: 15px;
            border: 1px solid rgba(255,215,0,0.2);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .type-stat-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,215,0,0.2);
        }

        .type-stat-box.cookies .stat-value {
            color: #ff6b6b;
            font-size: 28px;
            font-weight: bold;
        }

        .type-stat-box.twofa .stat-value {
            color: #686de0;
            font-size: 28px;
            font-weight: bold;
        }

        .type-stat-box.duplicate .stat-value {
            color: #4CAF50;
            font-size: 28px;
            font-weight: bold;
        }

        .type-stat-box .stat-label {
            color: #fff;
            font-size: 14px;
        }

        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .copy-all-btn {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            min-width: 200px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.4);
        }

        .search-box {
            flex: 2;
            min-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            background: #3a4055;
            border: none;
            border-radius: 40px;
            color: #fff;
            font-size: 16px;
            box-shadow: inset 5px 5px 10px rgba(0,0,0,0.5);
        }

        .settings-section {
            background: #2d3349;
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 10px;
        }

        .settings-header h3 {
            color: #ffd700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-header .arrow {
            color: #ffd700;
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .settings-header.active .arrow {
            transform: rotate(180deg);
        }

        .settings-content {
            display: none;
            padding-top: 20px;
        }

        .settings-content.show {
            display: block;
        }

        .payment-toggles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .toggle-item {
            background: #3a4055;
            padding: 12px 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
        }

        .toggle-item label {
            color: #fff;
            font-size: 14px;
        }

        .toggle-item input[type="checkbox"] {
            width: 44px;
            height: 22px;
            appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 22px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-item input[type="checkbox"]:checked {
            background: #ffd700;
        }

        .toggle-item input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .toggle-item input[type="checkbox"]:checked::before {
            left: 24px;
        }

        .save-settings-btn {
            background: linear-gradient(145deg, #ffd700, #ffa500);
            color: #1a1e2b;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
        }

        .system-control {
            background: rgba(255,215,0,0.05);
            border-radius: 30px;
            padding: 20px;
            margin-top: 20px;
        }

        .system-toggle {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .system-toggle button {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.4);
        }

        .btn-enable {
            background: linear-gradient(145deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-disable {
            background: linear-gradient(145deg, #f44336, #d32f2f);
            color: white;
        }

        .system-message {
            flex: 1;
            min-width: 300px;
        }

        .system-message input {
            width: 100%;
            padding: 12px 20px;
            background: #3a4055;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
        }

        .current-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            margin-left: 10px;
        }

        .status-on {
            background: rgba(76,175,80,0.2);
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }

        .status-off {
            background: rgba(244,67,54,0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .danger-zone {
            margin-top: 20px;
            padding: 20px;
            background: rgba(244,67,54,0.1);
            border-radius: 30px;
            border: 1px solid #f44336;
        }

        .danger-btn {
            background: linear-gradient(145deg, #f44336, #d32f2f);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
        }

        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .user-card {
            background: #2d3349;
            border-radius: 40px;
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 
                10px 10px 20px rgba(0,0,0,0.4),
                inset 2px 2px 5px rgba(255,255,255,0.1),
                inset -3px -3px 8px rgba(0,0,0,0.5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
        }

        .phone-number {
            background: linear-gradient(145deg, #ffd700, #ffa500);
            color: #1a1e2b;
            padding: 8px 15px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
        }

        .type-badge {
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
        }

        .type-badge.cookies {
            background: #ff6b6b;
            color: white;
        }

        .type-badge.twofa {
            background: #686de0;
            color: white;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-badge.pending {
            background: #ffa502;
            color: white;
        }

        .status-badge.approved {
            background: #26de81;
            color: white;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            color: #fff;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
        }

        .payment-badge {
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid #ffd700;
        }

        .stats-row-compact {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            margin: 5px 0 8px 0;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
        }

        .stats-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .total-accounts {
            color: #ffd700;
            font-size: 14px;
            font-weight: 600;
        }

        .total-accounts strong {
            font-size: 18px;
            color: #fff;
            background: rgba(255,215,0,0.2);
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 5px;
        }

        .duplicate-badge {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }

        .duplicate-badge strong {
            font-size: 18px;
            background: rgba(76, 175, 80, 0.3);
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 5px;
            color: #fff;
        }

        .rate-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding-top: 5px;
            border-top: 1px solid rgba(255,215,0,0.2);
        }

        .rate-input-small {
            width: 70px;
            background: #3a4055;
            border: 1px solid #ffd700;
            border-radius: 20px;
            padding: 4px 8px;
            color: #ffd700;
            font-weight: bold;
            font-size: 12px;
            outline: none;
            text-align: center;
        }

        .rate-input-small:focus {
            box-shadow: 0 0 10px rgba(255,215,0,0.3);
        }

        .amount-display {
            background: linear-gradient(145deg, #ffd700, #ffa500);
            color: #1a1e2b;
            padding: 4px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
        }

        .timestamp {
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            margin-top: 5px;
            text-align: right;
        }

        .expiry-info {
            color: #ffa502;
            font-size: 11px;
            margin-top: 2px;
            text-align: right;
        }

        .action-buttons {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .action-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: none;
            background: #3a4055;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 16px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.4);
        }

        .action-btn:hover {
            background: #ffd700;
            color: #1a1e2b;
            transform: scale(1.1);
        }

        .copy-usernames-btn {
            flex: 2;
            padding: 8px;
            border-radius: 12px;
            border: none;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .copy-usernames-btn:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }

        .approve-btn {
            background: linear-gradient(145deg, #26de81, #20bf6b);
            color: white;
            flex: 1;
            padding: 8px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        .approve-btn:hover {
            filter: brightness(1.1);
        }

        .delete-btn {
            background: rgba(244,67,54,0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }

        .delete-btn:hover {
            background: #f44336;
            color: white;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 18px 30px;
            background: #2d3349;
            border-radius: 30px;
            color: white;
            transform: translateX(450px);
            transition: 0.3s;
            z-index: 9999;
            border-left: 8px solid;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.4);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { border-left-color: #4CAF50; }
        .toast.error { border-left-color: #f44336; }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.6);
            font-size: 18px;
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }
            
            .stats-row {
                width: 100%;
                justify-content: space-between;
            }
            
            .action-bar {
                flex-direction: column;
            }
            
            .system-toggle {
                flex-direction: column;
            }
            
            .system-message {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>EBH TEAM</h1>
            </div>
            <div class="stats-row">
                <div class="stat-box">
                    <span id="totalUsers">0</span>
                    <label>ইউজার</label>
                </div>
                <div class="stat-box">
                    <span id="totalAccounts">0</span>
                    <label>একাউন্ট</label>
                </div>
                <button class="refresh-btn" onclick="loadData()">🔄</button>
            </div>
        </div>

        <div class="main-tabs">
            <button class="main-tab pending active" onclick="switchMainTab('pending')" id="tabPending">
                ⏳ পেন্ডিং
                <span class="badge" id="pendingCount">0</span>
            </button>
            <button class="main-tab approved" onclick="switchMainTab('approved')" id="tabApproved">
                ✅ অ্যাপ্রুভড
                <span class="badge" id="approvedCount">0</span>
            </button>
        </div>

        <div class="type-tabs">
            <button class="type-tab cookies active" onclick="switchType('cookies')" id="tabCookies">
                🍪 কুকিজ একাউন্ট
            </button>
            <button class="type-tab twofa" onclick="switchType('2fa')" id="tab2fa">
                🔐 2FA একাউন্ট
            </button>
        </div>

        <div class="type-stats">
            <div class="type-stat-box cookies" onclick="switchType('cookies')">
                <div class="stat-value" id="cookiesCount">0</div>
                <div class="stat-label">🍪 কুকিজ একাউন্ট</div>
            </div>
            <div class="type-stat-box twofa" onclick="switchType('2fa')">
                <div class="stat-value" id="twofaCount">0</div>
                <div class="stat-label">🔐 2FA একাউন্ট</div>
            </div>
            <div class="type-stat-box duplicate">
                <div class="stat-value" id="totalDuplicates">0</div>
                <div class="stat-label" id="duplicateLabel">✅ পেন্ডিং ওকে আইডি</div>
            </div>
        </div>

        <div class="action-bar">
            <button class="copy-all-btn" onclick="copyAllUsernames()">
                📋 সব একাউন্ট কপি
            </button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 ফোন বা টেলিগ্রাম সার্চ..." onkeyup="filterData()">
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-header" onclick="toggleSettings('payment')">
                <h3>⚙️ পেমেন্ট মেথড সেটিংস</h3>
                <span class="arrow" id="paymentArrow">▼</span>
            </div>
            <div class="settings-content" id="paymentSettings">
                <div class="payment-toggles">
                    <div class="toggle-item">
                        <label>💳 বিকাশ</label>
                        <input type="checkbox" id="toggleBkash" checked>
                    </div>
                    <div class="toggle-item">
                        <label>💵 নগদ</label>
                        <input type="checkbox" id="toggleNagad" checked>
                    </div>
                    <div class="toggle-item">
                        <label>🚀 রকেট</label>
                        <input type="checkbox" id="toggleRocket" checked>
                    </div>
                    <div class="toggle-item">
                        <label>📱 মোবাইল রিচার্জ</label>
                        <input type="checkbox" id="toggleMobileRecharge" checked>
                    </div>
                    <div class="toggle-item">
                        <label>₿ বাইন্যান্স</label>
                        <input type="checkbox" id="toggleBinance" checked>
                    </div>
                </div>
                <button class="save-settings-btn" onclick="savePaymentSettings()">
                    💾 সেটিংস সেভ করুন
                </button>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-header" onclick="toggleSettings('system')">
                <h3>🔧 সিস্টেম কন্ট্রোল</h3>
                <span class="arrow" id="systemArrow">▼</span>
            </div>
            <div class="settings-content" id="systemSettings">
                <div class="system-control">
                    <div style="display: flex; align-items: center; margin-bottom: 15px;">
                        <span style="color: #ffd700;">বর্তমান স্ট্যাটাস:</span>
                        <span id="systemStatus" class="current-status status-on">চালু</span>
                    </div>
                    <div class="system-toggle">
                        <button class="btn-enable" onclick="toggleSystem(true)">✅ সিস্টেম চালু</button>
                        <button class="btn-disable" onclick="toggleSystem(false)">⛔ সিস্টেম বন্ধ</button>
                        <div class="system-message">
                            <input type="text" id="maintenanceMessage" placeholder="মেইনটেন্যান্স মেসেজ..." value="সিস্টেম আপডেট চলছে, পরে আবার চেষ্টা করুন">
                        </div>
                    </div>
                    <button class="save-settings-btn" onclick="updateSystemStatus()" style="margin-top: 10px;">
                        📢 সিস্টেম স্ট্যাটাস আপডেট
                    </button>
                </div>

                <div class="danger-zone">
                    <button class="danger-btn" onclick="clearAllDatabase()">
                        🗑️ সম্পূর্ণ ডাটাবেজ ডিলিট
                    </button>
                </div>
            </div>
        </div>

        <div id="usersGrid" class="users-grid">
            <div class="empty-state">ডাটা লোড হচ্ছে...</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, remove, update, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // প্রথম ডাটাবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyCHqx6dAHeGFdtvY8682b_iQkdnk2ie0ug",
            authDomain: "saprahik-kaj.firebaseapp.com",
            databaseURL: "https://saprahik-kaj-default-rtdb.firebaseio.com",
            projectId: "saprahik-kaj",
            storageBucket: "saprahik-kaj.firebasestorage.app",
            messagingSenderId: "336661054558",
            appId: "1:336661054558:web:1beb394b660c9d6cf520cf",
            measurementId: "G-VDSE7LQRH9"
        };

        // দ্বিতীয় ডাটাবেস কনফিগারেশন
        const secondDatabaseConfig = {
            apiKey: "AIzaSyAmpKkaw_zpNGbgawtQrUPadBEh55e4mLM",
            authDomain: "free-lancher-24.firebaseapp.com",
            databaseURL: "https://free-lancher-24-default-rtdb.firebaseio.com",
            projectId: "free-lancher-24",
            storageBucket: "free-lancher-24.firebasestorage.app",
            messagingSenderId: "667574198748",
            appId: "1:667574198748:web:cdd8041e5cb3ec7da8af19"
        };

        // প্রথম ডাটাবেস initialize
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // দ্বিতীয় ডাটাবেস initialize
        const secondApp = initializeApp(secondDatabaseConfig, 'secondary');
        const secondDB = getDatabase(secondApp);

        // দ্বিতীয় ডাটাবেস থেকে সব ইউজারনেম মেমোরিতে লোড করার জন্য
        let allSecondDBUsernames = new Set();
        let secondDBLoaded = false;
        
        let allGroups = [];
        let currentType = 'cookies';
        let currentMainTab = 'pending';
        let searchTerm = '';

        // রেট সংরক্ষণের জন্য অবজেক্ট (লোকাল স্টোরেজ)
        let rateValues = {};

        // লোকাল স্টোরেজ থেকে রেট লোড
        function loadRatesFromStorage() {
            const saved = localStorage.getItem('userRates');
            if (saved) {
                try {
                    rateValues = JSON.parse(saved);
                } catch (e) {
                    rateValues = {};
                }
            }
        }

        // রেট সেভ করার ফাংশন
        window.saveRate = function(groupId, value) {
            const numValue = parseFloat(value) || 0;
            rateValues[groupId] = numValue;
            localStorage.setItem('userRates', JSON.stringify(rateValues));
            
            // টাকার পরিমাণ আপডেট
            updateAmountDisplay(groupId, numValue);
        };

        // টাকার পরিমাণ আপডেট
        function updateAmountDisplay(groupId, rate) {
            const group = allGroups.find(g => g.id === groupId);
            if (group) {
                const amountSpan = document.getElementById(`amount-${groupId}`);
                if (amountSpan) {
                    const totalAmount = (group.duplicateCount || 0) * rate;
                    amountSpan.textContent = totalAmount.toFixed(2) + ' টাকা';
                }
            }
        }

        // দ্বিতীয় ডাটাবেস থেকে সব ডাটা লোড করা
        async function loadSecondDatabase() {
            try {
                console.log('দ্বিতীয় ডাটাবেস লোড হচ্ছে...');
                const reportsRef = ref(secondDB, 'reports');
                const snapshot = await get(reportsRef);
                
                if (snapshot.exists()) {
                    const reports = snapshot.val();
                    allSecondDBUsernames.clear();
                    
                    Object.keys(reports).forEach(date => {
                        const dateData = reports[date];
                        if (dateData.users) {
                            Object.keys(dateData.users).forEach(type => {
                                const typeUsers = dateData.users[type];
                                Object.keys(typeUsers).forEach(encodedUsername => {
                                    allSecondDBUsernames.add(encodedUsername);
                                });
                            });
                        }
                    });
                    
                    secondDBLoaded = true;
                    console.log(`✅ দ্বিতীয় ডাটাবেস থেকে ${allSecondDBUsernames.size} টি ইউজারনেম লোড হয়েছে`);
                }
            } catch (error) {
                console.error('দ্বিতীয় ডাটাবেস লোড করতে সমস্যা:', error);
            }
        }

        // এনকোডিং ফাংশন
        function encodeUsername(username) {
            if (!username) return '';
            let encoded = '';
            for (let i = 0; i < username.length; i++) {
                const char = username[i];
                if (char === '.') encoded += '_x2E_';
                else if (char === '#') encoded += '_x23_';
                else if (char === '$') encoded += '_x24_';
                else if (char === '[') encoded += '_x5B_';
                else if (char === ']') encoded += '_x5D_';
                else if (char === '/') encoded += '_x2F_';
                else if (char === '\\') encoded += '_x5C_';
                else encoded += char;
            }
            return encoded;
        }

        // ডুপ্লিকেট চেক করার ফাংশন
        function checkDuplicates(usernames) {
            if (!secondDBLoaded || !usernames || usernames.length === 0) return 0;
            
            let duplicateCount = 0;
            usernames.forEach(username => {
                const encoded = encodeUsername(username);
                if (allSecondDBUsernames.has(encoded)) {
                    duplicateCount++;
                }
            });
            return duplicateCount;
        }

        // পুরনো ডাটা ডিলিট করার ফাংশন (১৫ দিন পর)
        async function deleteOldData() {
            try {
                const submitsRef = ref(db, 'submits');
                const snapshot = await get(submitsRef);
                
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const fifteenDaysAgo = Date.now() - (15 * 24 * 60 * 60 * 1000);
                    const promises = [];
                    
                    Object.keys(data).forEach(key => {
                        const item = data[key];
                        // শুধুমাত্র অ্যাপ্রুভড ডাটা চেক করা হবে
                        if (item.status === 'approved' && item.approvedAt && item.approvedAt < fifteenDaysAgo) {
                            promises.push(remove(ref(db, 'submits/' + key)));
                        }
                    });
                    
                    if (promises.length > 0) {
                        await Promise.all(promises);
                        console.log(`${promises.length} টি পুরনো অ্যাপ্রুভড ডাটা ডিলিট হয়েছে`);
                        loadData(); // রিলোড ডাটা
                    }
                }
            } catch (error) {
                console.error('পুরনো ডাটা ডিলিট করতে সমস্যা:', error);
            }
        }

        // টগল ফাংশন
        window.toggleSettings = function(type) {
            const content = document.getElementById(type + 'Settings');
            const arrow = document.getElementById(type + 'Arrow');
            content.classList.toggle('show');
            arrow.style.transform = content.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0)';
        };

        // মেইন ট্যাব সুইচ
        window.switchMainTab = function(tab) {
            currentMainTab = tab;
            document.getElementById('tabPending').classList.remove('active');
            document.getElementById('tabApproved').classList.remove('active');
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            
            // ডুপ্লিকেট লেবেল আপডেট
            const duplicateLabel = document.getElementById('duplicateLabel');
            if (tab === 'pending') {
                duplicateLabel.textContent = '✅ পেন্ডিং ওকে আইডি';
            } else {
                duplicateLabel.textContent = '✅ অ্যাপ্রুভড ওকে আইডি';
            }
            
            filterData();
        };

        // টাইপ সুইচ
        window.switchType = function(type) {
            currentType = type;
            document.getElementById('tabCookies').classList.remove('active');
            document.getElementById('tab2fa').classList.remove('active');
            document.getElementById('tab' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
            
            filterData();
        };

        // সিস্টেম স্ট্যাটাস লোড
        const systemRef = ref(db, 'settings/system');
        onValue(systemRef, (snapshot) => {
            const data = snapshot.val() || { enabled: true, message: '' };
            const statusEl = document.getElementById('systemStatus');
            const messageInput = document.getElementById('maintenanceMessage');
            
            if (data.enabled) {
                statusEl.textContent = 'চালু';
                statusEl.className = 'current-status status-on';
            } else {
                statusEl.textContent = 'বন্ধ';
                statusEl.className = 'current-status status-off';
            }
            if (data.message) messageInput.value = data.message;
        });

        // পেমেন্ট সেটিংস লোড
        const settingsRef = ref(db, 'settings/paymentMethods');
        onValue(settingsRef, (snapshot) => {
            const settings = snapshot.val() || {};
            document.getElementById('toggleBkash').checked = settings.bkash !== false;
            document.getElementById('toggleNagad').checked = settings.nagad !== false;
            document.getElementById('toggleRocket').checked = settings.rocket !== false;
            document.getElementById('toggleMobileRecharge').checked = settings.mobileRecharge !== false;
            document.getElementById('toggleBinance').checked = settings.binance !== false;
        });

        window.savePaymentSettings = function() {
            const settings = {
                bkash: document.getElementById('toggleBkash').checked,
                nagad: document.getElementById('toggleNagad').checked,
                rocket: document.getElementById('toggleRocket').checked,
                mobileRecharge: document.getElementById('toggleMobileRecharge').checked,
                binance: document.getElementById('toggleBinance').checked
            };
            set(settingsRef, settings)
                .then(() => showToast('পেমেন্ট সেটিংস সেভ হয়েছে', 'success'))
                .catch(() => showToast('সেভ করতে সমস্যা', 'error'));
        };

        window.toggleSystem = function(enabled) {
            const message = document.getElementById('maintenanceMessage').value;
            set(systemRef, { enabled, message })
                .then(() => showToast(`সিস্টেম ${enabled ? 'চালু' : 'বন্ধ'} করা হয়েছে`, 'success'));
        };

        window.updateSystemStatus = function() {
            const message = document.getElementById('maintenanceMessage').value;
            set(systemRef, { enabled: true, message })
                .then(() => showToast('সিস্টেম স্ট্যাটাস আপডেট হয়েছে', 'success'));
        };

        // ডাটা লোড
        window.loadData = function() {
            const submitsRef = ref(db, 'submits');
            
            onValue(submitsRef, (snapshot) => {
                const data = snapshot.val();
                
                // কাউন্টার রিসেট
                let totalPendingCookies = 0;
                let totalPending2fa = 0;
                let totalApprovedCookies = 0;
                let totalApproved2fa = 0;
                
                if (data) {
                    const grouped = {};
                    
                    // প্রথমে সব ডাটা গ্রুপ করা এবং কাউন্টিং
                    Object.keys(data).forEach(key => {
                        const item = { id: key, ...data[key] };
                        const number = item.number || 'unknown';
                        const type = item.type || 'cookies';
                        const status = item.status || 'pending';
                        
                        // টাইপ এবং স্ট্যাটাস অনুযায়ী কাউন্টিং
                        if (type === 'cookies') {
                            if (status === 'pending') totalPendingCookies++;
                            else if (status === 'approved') totalApprovedCookies++;
                        } else if (type === '2fa') {
                            if (status === 'pending') totalPending2fa++;
                            else if (status === 'approved') totalApproved2fa++;
                        }
                        
                        const groupKey = number + '_' + type + '_' + status;
                        
                        if (!grouped[groupKey]) {
                            grouped[groupKey] = {
                                id: groupKey.replace(/[^a-zA-Z0-9]/g, '_'),
                                number: number,
                                telegram: item.telegram,
                                paymentMethod: item.paymentMethod,
                                timestamp: item.timestamp,
                                status: status,
                                approvedAt: item.approvedAt || item.timestamp,
                                type: type,
                                accounts: [],
                                ids: []
                            };
                        }
                        
                        if (item.username) {
                            grouped[groupKey].accounts.push(item.username);
                        }
                        grouped[groupKey].ids.push(key);
                    });
                    
                    allGroups = Object.values(grouped);
                    
                    // ডুপ্লিকেট কাউন্ট যোগ করা
                    allGroups.forEach(group => {
                        group.duplicateCount = checkDuplicates(group.accounts);
                    });
                    
                } else {
                    allGroups = [];
                }
                
                // পেন্ডিং এবং অ্যাপ্রুভড কাউন্ট আপডেট
                document.getElementById('pendingCount').textContent = totalPendingCookies + totalPending2fa;
                document.getElementById('approvedCount').textContent = totalApprovedCookies + totalApproved2fa;
                
                // বর্তমান ট্যাব এবং টাইপ অনুযায়ী কাউন্টার আপডেট
                updateCountersByCurrentView(totalPendingCookies, totalPending2fa, totalApprovedCookies, totalApproved2fa);
                
                filterData();
            });
        };

        // বর্তমান ভিউ অনুযায়ী কাউন্টার আপডেট করার ফাংশন
        function updateCountersByCurrentView(pendingCookies, pending2fa, approvedCookies, approved2fa) {
            if (currentMainTab === 'pending') {
                document.getElementById('cookiesCount').textContent = pendingCookies;
                document.getElementById('twofaCount').textContent = pending2fa;
            } else {
                document.getElementById('cookiesCount').textContent = approvedCookies;
                document.getElementById('twofaCount').textContent = approved2fa;
            }
        }

        window.filterData = function() {
            searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            // প্রথমে টাইপ এবং স্ট্যাটাস অনুযায়ী ফিল্টার
            let filtered = allGroups.filter(group => 
                group.type === currentType && 
                group.status === currentMainTab
            );
            
            // তারপর সার্চ টার্ম অনুযায়ী ফিল্টার
            if (searchTerm) {
                filtered = filtered.filter(group => 
                    group.number?.toLowerCase().includes(searchTerm) ||
                    group.telegram?.toLowerCase().includes(searchTerm)
                );
            }
            
            // ডুপ্লিকেট কাউন্ট আপডেট করা (শুধু বর্তমান ভিউ অনুযায়ী)
            const totalDuplicatesInView = filtered.reduce((sum, group) => sum + (group.duplicateCount || 0), 0);
            document.getElementById('totalDuplicates').textContent = totalDuplicatesInView;
            
            // ইউজার এবং একাউন্ট কাউন্ট আপডেট
            document.getElementById('totalUsers').textContent = filtered.length;
            document.getElementById('totalAccounts').textContent = filtered.reduce((sum, group) => sum + group.accounts.length, 0);
            
            displayGroups(filtered);
        };

        // ইউজার অ্যাপ্রুভ করার ফাংশন
        window.approveUser = function(idsStr) {
            const ids = idsStr.split(',');
            const approvedAt = Date.now();
            
            const promises = ids.map(id => 
                update(ref(db, 'submits/' + id), { 
                    status: 'approved',
                    approvedAt: approvedAt
                })
            );
            
            Promise.all(promises)
                .then(() => {
                    showToast('✅ ইউজার অ্যাপ্রুভ করা হয়েছে', 'success');
                    // পুরনো ডাটা চেক করুন
                    deleteOldData();
                })
                .catch(() => showToast('অ্যাপ্রুভ করতে সমস্যা', 'error'));
        };

        function displayGroups(groups) {
            const container = document.getElementById('usersGrid');
            
            if (groups.length === 0) {
                container.innerHTML = `<div class="empty-state">📭 কোন ${currentMainTab === 'pending' ? 'পেন্ডিং' : 'অ্যাপ্রুভড'} ${currentType === 'cookies' ? 'কুকিজ' : '2FA'} একাউন্ট নেই</div>`;
                return;
            }

            groups.sort((a, b) => {
                if (currentMainTab === 'approved') {
                    return (b.approvedAt || 0) - (a.approvedAt || 0);
                }
                return (b.timestamp || 0) - (a.timestamp || 0);
            });

            container.innerHTML = groups.map(group => {
                const date = new Date(group.timestamp || Date.now());
                const timeString = date.toLocaleString('bn-BD');
                const telegramLink = `https://t.me/${group.telegram || ''}`;
                const savedRate = rateValues[group.id] || 0;
                const totalAmount = (group.duplicateCount || 0) * savedRate;
                
                // অ্যাপ্রুভড হলে কত দিন হলো তা দেখান
                let expiryInfo = '';
                if (group.status === 'approved' && group.approvedAt) {
                    const daysPassed = Math.floor((Date.now() - group.approvedAt) / (24 * 60 * 60 * 1000));
                    const daysLeft = 15 - daysPassed;
                    if (daysLeft > 0) {
                        expiryInfo = `<div class="expiry-info">⏳ আরো ${daysLeft} দিন বাকি</div>`;
                    }
                }

                return `
                    <div class="user-card">
                        <div class="card-header">
                            <span class="phone-number">📞 ${group.number}</span>
                            <div style="display: flex; gap: 5px;">
                                <span class="type-badge ${group.type === 'cookies' ? 'cookies' : 'twofa'}">
                                    ${group.type === 'cookies' ? '🍪 কুকিজ' : '🔐 2FA'}
                                </span>
                                <span class="status-badge ${group.status}">
                                    ${group.status === 'pending' ? '⏳ পেন্ডিং' : '✅ অ্যাপ্রুভড'}
                                </span>
                            </div>
                        </div>
                        
                        <div class="info-row">
                            <span>📱</span>
                            <span>@${group.telegram || 'N/A'}</span>
                        </div>
                        
                        <div class="info-row">
                            <span>💰</span>
                            <span class="payment-badge">${group.paymentMethod || 'N/A'}</span>
                        </div>
                        
                        <div class="stats-row-compact">
                            <div class="stats-top">
                                <div class="total-accounts">
                                    📊 মোট একাউন্ট: <strong>${group.accounts.length}</strong>
                                </div>
                                ${group.duplicateCount > 0 ? `
                                    <div class="duplicate-badge">
                                        ✅ Okay ID: <strong>${group.duplicateCount}</strong>
                                    </div>
                                ` : ''}
                            </div>
                            
                            <div class="rate-section">
                                <input type="number" class="rate-input-small" 
                                    placeholder="রেট" 
                                    value="${savedRate}"
                                    onchange="saveRate('${group.id}', this.value)"
                                    step="0.01"
                                    min="0">
                                <span class="amount-display" id="amount-${group.id}">
                                    ${totalAmount.toFixed(2)} টাকা
                                </span>
                            </div>
                        </div>
                        
                        <div class="timestamp">⏰ ${timeString}</div>
                        ${expiryInfo}
                        
                        <div class="action-buttons">
                            <button class="copy-usernames-btn" onclick='copyUsernames(${JSON.stringify(group.accounts)})'>
                                📋 সব কপি (${group.accounts.length})
                            </button>
                            <button class="action-btn" onclick="copyText('${group.number}')" title="কপি নাম্বার">📞</button>
                            <a href="${telegramLink}" target="_blank" class="action-btn" title="টেলিগ্রাম">✈️</a>
                            ${group.status === 'pending' ? `
                                <button class="approve-btn" onclick="approveUser('${group.ids.join(',')}')">
                                    ✅ অ্যাপ্রুভ
                                </button>
                            ` : ''}
                            <button class="action-btn delete-btn" onclick="deleteGroup('${group.ids.join(',')}')">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ইউজারের সব একাউন্ট কপি করার ফাংশন
        window.copyUsernames = function(usernames) {
            if (!usernames || usernames.length === 0) {
                showToast('❌ কপি করার মতো একাউন্ট নেই', 'error');
                return;
            }
            
            const text = usernames.join('\n');
            
            navigator.clipboard.writeText(text).then(() => {
                showToast(`✅ ${usernames.length} টি একাউন্ট কপি হয়েছে`, 'success');
            }).catch((err) => {
                console.error('Copy failed:', err);
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast(`✅ ${usernames.length} টি একাউন্ট কপি হয়েছে`, 'success');
            });
        };

        window.copyText = function(text) {
            if (!text) {
                showToast('❌ কপি করার মতো টেক্সট নেই', 'error');
                return;
            }
            
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ কপি হয়েছে!', 'success');
            }).catch((err) => {
                console.error('Copy failed:', err);
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('✅ কপি হয়েছে!', 'success');
            });
        };

        window.copyAllUsernames = function() {
            const filtered = allGroups.filter(g => g.type === currentType && g.status === currentMainTab);
            const allUsernames = filtered.flatMap(g => g.accounts);
            
            if (allUsernames.length === 0) {
                showToast('❌ কপি করার মতো একাউন্ট নেই', 'error');
                return;
            }
            
            const text = allUsernames.join('\n');
            
            navigator.clipboard.writeText(text).then(() => {
                showToast(`✅ সব ${allUsernames.length} টি একাউন্ট কপি হয়েছে`, 'success');
            }).catch((err) => {
                console.error('Copy failed:', err);
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast(`✅ সব ${allUsernames.length} টি একাউন্ট কপি হয়েছে`, 'success');
            });
        };

        window.deleteGroup = function(idsStr) {
            if (confirm('আপনি কি এই গ্রুপের সব একাউন্ট ডিলিট করতে চান?')) {
                const ids = idsStr.split(',');
                const promises = ids.map(id => remove(ref(db, 'submits/' + id)));
                Promise.all(promises)
                    .then(() => showToast('গ্রুপ ডিলিট করা হয়েছে', 'success'))
                    .catch(() => showToast('ডিলিট করতে সমস্যা', 'error'));
            }
        };

        window.clearAllDatabase = function() {
            if (confirm('⚠️ আপনি কি সম্পূর্ণ ডাটাবেজ ডিলিট করতে চান?')) {
                if (confirm('আপনি কি নিশ্চিত? এই কাজ অপরিবর্তনীয়!')) {
                    remove(ref(db, 'submits'))
                        .then(() => {
                            showToast('সমস্ত ডাটা ডিলিট করা হয়েছে', 'success');
                            loadData();
                        })
                        .catch(() => showToast('ডিলিট করতে সমস্যা', 'error'));
                }
            }
        };

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type} show`;
            toast.textContent = message;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // প্রতি ঘন্টায় পুরনো ডাটা চেক করা (১৫ দিন পর ডিলিট)
        setInterval(deleteOldData, 60 * 60 * 1000); // প্রতি ঘন্টা

        // লোকাল স্টোরেজ থেকে রেট লোড
        loadRatesFromStorage();

        // দ্বিতীয় ডাটাবেস লোড করে তারপর প্রথম ডাটাবেস লোড করা
        loadSecondDatabase().then(() => {
            loadData();
            // প্রথম লোডেই পুরনো ডাটা চেক করুন
            deleteOldData();
        });
    </script>
</body>
</html>
